<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse · Snacc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<style>
.catalog-wrap { padding: 2.5rem 3.5rem 6rem; max-width: 1100px; margin: 0 auto; }
.catalog-header { margin-bottom: 2.5rem; }
.catalog-heading { font-family: 'Bitcount Prop Single', monospace; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 700; line-height: 1; letter-spacing: -.02em; margin-bottom: .4rem; }
.warehouse-body { display: flex; align-items: stretch; border-top: 1px solid var(--border); }
.warehouse-rail { width: 25%; min-width: 160px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 1.5rem 1.25rem 2rem; }
.rail-user { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.75rem; }
.rail-stat { display: flex; justify-content: space-between; align-items: baseline; gap: .75rem; margin-bottom: 1rem; padding-bottom: .85rem; border-bottom: 1px solid var(--border); }
.rail-stat:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.rail-stat-label { font-size: 0.6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.rail-stat-num { font-family: 'Bitcount Prop Single', monospace; font-size: 1.15rem; font-weight: 700; color: var(--ink); }
.warehouse-main { flex: 1; min-width: 0; padding: 1.5rem 0 0 2rem; }
.wh-section { margin-bottom: 2.5rem; }
.wh-section-title { font-size: 0.6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; padding-bottom: .6rem; border-bottom: 1px solid var(--border); }
.wh-scroll { display: grid; grid-template-columns: repeat(3, 1fr); border-left: 1px solid var(--border); border-top: 1px solid var(--border); }
.wh-scroll .card { min-width: 0; }
.wh-scroll .card.featured { grid-row: span 2; display: flex; flex-direction: column; }
.wh-scroll .card.featured .card-img-wrap { aspect-ratio: unset; flex: 1; min-height: 0; }
.wh-viz { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--border); margin-top: 0; }
.wh-viz-half { padding: 1.25rem 1.5rem 1.5rem; border-right: 1px solid var(--border); }
.wh-viz-half:last-child { border-right: none; }
.wh-viz-title { font-size: 0.6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: .85rem; }
.wh-viz-bar { display: flex; height: 10px; width: 100%; overflow: hidden; border: 1px solid var(--border); }
.wh-viz-seg { height: 100%; transition: width .5s cubic-bezier(.16,1,.3,1); }
.wh-viz-seg.eat { background: #1a7a3a; }
.wh-viz-seg.mid { background: #7a6a00; }
.wh-viz-seg.never { background: #8a1a1a; }
.wh-viz-legend { display: flex; flex-wrap: wrap; gap: .65rem .9rem; margin-top: .75rem; }
.wh-viz-legend span { font-size: .48rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.wh-viz-legend i { font-style: normal; font-family: 'Bitcount Prop Single', monospace; font-size: .75rem; color: var(--ink); margin-left: .25rem; }
.wh-viz-empty { font-size: .55rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: .5rem 0 0; }
.empty-main { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 42vh; text-align: center; padding: 2rem 1rem; border: 1px dashed var(--border); }
.empty-main.show { display: flex; }
.empty-main .empty-heading { font-family: 'Bitcount Prop Single', monospace; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 700; line-height: .95; letter-spacing: -.02em; margin-bottom: 1rem; }
.empty-main .empty-sub { font-size: 0.65rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.75rem; line-height: 1.8; }
.empty-main .empty-cta { display: inline-flex; align-items: center; gap: .6rem; background: var(--ink); color: var(--bg); padding: 1rem 2rem; text-decoration: none; font-size: 0.65rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; cursor: none; transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
.empty-main .empty-cta:hover { transform: scale(1.05); }
.main-has-items .empty-main { display: none !important; }
#snack-section, #drink-section, #viz-section { display: none; }
.main-has-items #snack-section, .main-has-items #drink-section, .main-has-items #viz-section { display: block; }
.card { background: var(--card-bg); cursor: none; opacity: 0; transform: translateY(16px); transition: opacity .4s ease, transform .4s cubic-bezier(.16,1,.3,1); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; }
.card.in { opacity: 1; transform: translateY(0); }
.card-img-wrap { aspect-ratio: 1/1; position: relative; overflow: hidden; }
.card-img-bg { position: absolute; inset: 0; }
.card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 12%; filter: drop-shadow(0 4px 12px rgba(0,0,0,.3)); opacity: 0; transition: opacity .4s ease, transform .5s cubic-bezier(.25,1,.5,1); z-index: 1; }
.card:hover .card-img { transform: scale(1.07); }
.card-no-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 1; }
.card-no-label p { font-size: .65rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.7); text-align: center; line-height: 1.4; }
.card-skeleton { position: absolute; inset: 0; z-index: 2; background: linear-gradient(90deg, rgba(0,0,0,.03) 0%, rgba(0,0,0,.07) 50%, rgba(0,0,0,.03) 100%); background-size: 200% 100%; animation: shimmer 1.6s infinite; transition: opacity .4s ease; }
.card-menu-btn { position: absolute; top: .5rem; right: .5rem; width: 26px; height: 26px; background: rgba(0,0,0,.5); border: none; display: flex; align-items: center; justify-content: center; cursor: none; transition: background .2s; padding: 0; z-index: 6; opacity: 0; transition: opacity .2s, background .2s; }
.card:hover .card-menu-btn { opacity: 1; }
.card-menu-btn:hover { background: rgba(0,0,0,.75); }
.card-menu-btn svg { width: 12px; height: 12px; fill: #fff; }
.card-info { padding: .75rem 1rem; border-top: 1px solid var(--border); }
.card-name { font-size: .72rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .2rem; }
.card-brand { font-size: .52rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: .45rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.popup-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s ease; }
.popup-backdrop.show { opacity: 1; pointer-events: all; }
.popup { background: rgba(238,235,227,0.88); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); padding: 2.5rem 2.5rem 2rem; max-width: 320px; width: 90%; transform: translateY(20px) scale(.97); transition: transform .35s cubic-bezier(.16,1,.3,1); }
.popup-backdrop.show .popup { transform: translateY(0) scale(1); }
.popup-label { font-size: 0.6rem; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-bottom: .6rem; }
.popup-heading { font-family: 'Bitcount Prop Single', monospace; font-size: 1.8rem; font-weight: 700; line-height: 1; letter-spacing: -.01em; margin-bottom: .75rem; }
.popup-sub { font-size: 0.68rem; color: var(--muted); letter-spacing: .04em; line-height: 1.6; margin-bottom: 2rem; }
.popup-name { font-weight: 700; color: var(--ink); }
.popup-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.popup-cancel { padding: .85rem; background: transparent; border: 1px solid var(--border); font-family: inherit; font-size: 0.65rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ink); cursor: none; transition: border-color .2s, background .2s; }
.popup-cancel:hover { background: rgba(17,17,17,.06); border-color: var(--ink); }
.popup-confirm { padding: .85rem; background: var(--ink); border: 1px solid var(--ink); font-family: inherit; font-size: 0.65rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--bg); cursor: none; transition: transform .25s cubic-bezier(.34,1.56,.64,1); }
.popup-confirm:hover { transform: scale(1.04); }
.edit-vibe-row { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: .5rem; }
.edit-vibe-btn { padding: .75rem .5rem; border: 1px solid var(--border); background: transparent; font-family: inherit; font-size: 0.58rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); cursor: none; transition: border-color .2s, background .2s; }
.edit-vibe-btn:hover, .edit-vibe-btn.picked { border-color: var(--ink); background: rgba(17,17,17,.06); }
.action-divider { width: 100%; height: 1px; background: var(--border); margin: 1.5rem 0 1rem; }
.action-remove { width: 100%; padding: .85rem; background: transparent; border: 1px solid rgba(160,40,40,.35); font-family: inherit; font-size: 0.65rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #9a2a2a; cursor: none; transition: background .2s, border-color .2s; }
.action-remove:hover { background: rgba(160,40,40,.08); border-color: #9a2a2a; }
.action-remove.confirming { background: #8a1a1a; color: #fff; border-color: #8a1a1a; }
.nut-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.nut-edit-field label { font-size: .48rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: .25rem; }
.nut-edit-field input { width: 100%; padding: .5rem .6rem; border: 1px solid var(--border); background: transparent; font-family: inherit; font-size: .68rem; color: var(--ink); outline: none; box-sizing: border-box; }
.nut-edit-field input:focus { border-color: var(--ink); }
.nav-dropdown a.active { color: var(--ink); font-weight: 600; }
@media (max-width: 700px) {
  .catalog-wrap { padding: 1.5rem 1.25rem 5rem; }
  .warehouse-body { flex-direction: column; }
  .warehouse-rail { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; margin-bottom: .5rem; }
  .warehouse-main { padding-left: 0; padding-top: 1.5rem; }
  .wh-scroll { grid-template-columns: repeat(2, 1fr); }
  .wh-scroll .card.featured { grid-row: span 1; display: block; }
  .wh-scroll .card.featured .card-img-wrap { aspect-ratio: 1/1; flex: unset; }
  .wh-viz { grid-template-columns: 1fr; }
  .wh-viz-half { border-right: none; border-bottom: 1px solid var(--border); }
  .wh-viz-half:last-child { border-bottom: none; }
}
</style>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<nav>
  <a href="feed.html" class="logo">Snacc.</a>
  <ul class="nav-links">
    <li><a href="feed.html">Snaccs</a></li>
    <li><a href="drink.html">Drinks</a></li>
    <li><a href="log.html">Log an Item</a></li>
    <li class="nav-profile">
      <button class="nav-username" id="nav-username"></button>
      <div class="nav-dropdown" id="nav-dropdown">
        <a href="index.html" class="active" id="nav-warehouse-link">Warehouse</a>
        <button onclick="logout()">Sign out</button>
      </div>
    </li>
  </ul>
</nav>
<div class="catalog-wrap">
  <div class="catalog-header">
    <h1 class="catalog-heading">Warehouse.</h1>
  </div>
  <div class="warehouse-body">
    <aside class="warehouse-rail" id="warehouse-rail">
      <p class="rail-user" id="rail-user"></p>
      <div class="rail-stat"><span class="rail-stat-label">Total</span><span class="rail-stat-num" id="stat-total">0</span></div>
      <div class="rail-stat"><span class="rail-stat-label">Snaccs</span><span class="rail-stat-num" id="stat-snacks">0</span></div>
      <div class="rail-stat"><span class="rail-stat-label">Drinks</span><span class="rail-stat-num" id="stat-drinks">0</span></div>
    </aside>
    <div class="warehouse-main" id="warehouse-main">
      <div class="empty-main" id="empty-main">
        <p class="empty-heading">Nothing<br>yet.</p>
        <p class="empty-sub">You haven't logged anything.<br>Get tasting.</p>
        <a href="log.html" class="empty-cta">Log your first item</a>
      </div>
      <div id="snack-section" class="wh-section">
        <p class="wh-section-title">Snaccs</p>
        <div class="wh-scroll" id="snack-scroll"></div>
      </div>
      <div id="drink-section" class="wh-section">
        <p class="wh-section-title">Drinks</p>
        <div class="wh-scroll" id="drink-scroll"></div>
      </div>
      <div id="viz-section" class="wh-section">
        <div class="wh-viz" id="wh-viz">
          <div class="wh-viz-half">
            <p class="wh-viz-title">Snaccs</p>
            <div id="viz-snack-bar" class="wh-viz-bar"></div>
            <div class="wh-viz-legend" id="viz-snack-legend"></div>
          </div>
          <div class="wh-viz-half">
            <p class="wh-viz-title">Drinks</p>
            <div id="viz-drink-bar" class="wh-viz-bar"></div>
            <div class="wh-viz-legend" id="viz-drink-legend"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="popup-backdrop" id="action-backdrop">
  <div class="popup">
    <p class="popup-label" id="action-label">Your log</p>
    <p class="popup-heading" id="action-name"></p>
    <p class="popup-sub" id="action-brand"></p>
    <div class="edit-vibe-row">
      <button type="button" class="edit-vibe-btn" data-vibe="eat" id="action-eat-btn">Would Eat Again</button>
      <button type="button" class="edit-vibe-btn" data-vibe="mid">Mid</button>
      <button type="button" class="edit-vibe-btn" data-vibe="never">Never Again</button>
    </div>
    <div id="action-nut-section" style="display:none">
      <div class="action-divider"></div>
      <p class="popup-label" style="margin-bottom:.75rem">Nutrition</p>
      <div class="nut-edit-grid" id="nut-edit-grid"></div>
      <button class="popup-confirm" id="nut-save-btn" style="width:100%;margin-top:.75rem">Save nutrition</button>
    </div>
    <div class="action-divider"></div>
    <button class="action-remove" id="action-remove">Remove this log</button>
    <div class="popup-actions" style="margin-top:.75rem;grid-template-columns:1fr">
      <button class="popup-cancel" id="action-cancel">Cancel</button>
    </div>
  </div>
</div>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('nav-username').textContent = '@' + user.username;
  document.getElementById('rail-user').textContent = '@' + user.username;

  const vibeLabel = {
    snack: { eat: 'Would Eat Again', mid: 'Mid', never: 'Never Again' },
    drink: { eat: 'Would Drink Again', mid: 'Mid', never: 'Never Again' },
  };
  const vibeCls = { eat: 'vibe-eat', mid: 'vibe-mid', never: 'vibe-never' };
  const noImgColors = ['#1a2a4a','#3a1a1a','#1a3a1a','#2a1a3a','#3a2a1a','#1a3a3a'];

  let activeRow = null;
  let removeConfirming = false;
  const actionBackdrop = document.getElementById('action-backdrop');

  function openAction(row) {
    activeRow = row;
    removeConfirming = false;
    const kind = row.kind === 'drink' ? 'drink' : 'snack';
    document.getElementById('action-label').textContent = kind === 'drink' ? 'Your drink log' : 'Your snack log';
    document.getElementById('action-name').textContent = row.name;
    document.getElementById('action-brand').textContent = row.brand || '';
    document.getElementById('action-eat-btn').textContent = vibeLabel[kind].eat;
    document.querySelectorAll('.edit-vibe-btn').forEach(b => b.classList.toggle('picked', b.dataset.vibe === row.vibe));
    const removeBtn = document.getElementById('action-remove');
    removeBtn.textContent = 'Remove this log';
    removeBtn.classList.remove('confirming');

    const nutSection = document.getElementById('action-nut-section');
    const nutGrid = document.getElementById('nut-edit-grid');
    if (row.source === 'Manual') {
      const isDrink = kind === 'drink';
      const n = row.nutrition || {};
      const fields = isDrink
        ? [['serving','Serving',''],['calories','Calories',''],['sugars','Sugars (g)',''],['carbs','Carbs (g)',''],['sodium','Sodium (mg)',''],['caffeine','Caffeine (mg)',''],['protein','Protein (g)','']]
        : [['serving','Serving',''],['calories','Calories',''],['fat','Fat (g)',''],['satFat','Sat Fat (g)',''],['sodium','Sodium (mg)',''],['carbs','Carbs (g)',''],['fiber','Fiber (g)',''],['sugars','Sugars (g)',''],['protein','Protein (g)','']];
      nutGrid.innerHTML = fields.map(([key, label]) =>
        `<div class="nut-edit-field"><label>${label}</label><input id="ne-${key}" type="${key==='serving'?'text':'number'}" value="${n[key]??''}" placeholder="—"/></div>`
      ).join('');
      nutSection.style.display = '';
    } else {
      nutSection.style.display = 'none';
    }

    actionBackdrop.classList.add('show');
  }
  function closeAction() { actionBackdrop.classList.remove('show'); activeRow = null; removeConfirming = false; }

  actionBackdrop.addEventListener('click', e => { if (e.target === actionBackdrop) closeAction(); });
  document.getElementById('action-cancel').addEventListener('click', closeAction);

  document.querySelectorAll('.edit-vibe-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!activeRow) return;
      const v = btn.dataset.vibe;
      const { error } = await sb.from('ratings').update({ vibe: v }).eq('id', activeRow.id);
      if (error) { alert('Failed to update: ' + error.message); return; }
      closeAction(); await render();
    });
    btn.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    btn.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });

  document.getElementById('nut-save-btn').addEventListener('click', async () => {
    if (!activeRow) return;
    const kind = activeRow.kind === 'drink' ? 'drink' : 'snack';
    const isDrink = kind === 'drink';
    const keys = isDrink
      ? ['serving','calories','sugars','carbs','sodium','caffeine','protein']
      : ['serving','calories','fat','satFat','sodium','carbs','fiber','sugars','protein'];
    const n = {};
    keys.forEach(k => {
      const el = document.getElementById('ne-' + k);
      if (!el) return;
      n[k] = k === 'serving' ? (el.value.trim() || null) : (el.value !== '' ? parseFloat(el.value) : null);
    });
    const btn = document.getElementById('nut-save-btn');
    btn.textContent = 'Saving…'; btn.disabled = true;
    const { error } = await sb.from('ratings').update({ nutrition: n }).eq('id', activeRow.id);
    btn.textContent = 'Save nutrition'; btn.disabled = false;
    if (error) { alert('Failed: ' + error.message); return; }
    closeAction();
    await render();
  });

  document.getElementById('action-remove').addEventListener('click', async () => {
    if (!activeRow) return;
    if (!removeConfirming) {
      removeConfirming = true;
      const btn = document.getElementById('action-remove');
      btn.textContent = 'Tap again to confirm';
      btn.classList.add('confirming');
      return;
    }
    const id = activeRow.id;
    closeAction();
    await sb.from('ratings').delete().eq('id', id);
    await render();
  });

  ['action-cancel', 'action-remove', 'nut-save-btn'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });

  function buildCard(row, delay) {
    const card = document.createElement('div'); card.className = 'card';
    const kind = row.kind === 'drink' ? 'drink' : 'snack';
    const v = vibeLabel[kind][row.vibe] || 'Mid';
    const cls = vibeCls[row.vibe] || 'vibe-mid';

    const imgWrap = document.createElement('div'); imgWrap.className = 'card-img-wrap';
    const bg = document.createElement('div'); bg.className = 'card-img-bg';
    bg.style.backgroundColor = noImgColors[(row.name || '').charCodeAt(0) % noImgColors.length];
    imgWrap.appendChild(bg);

    if (row.image) {
      const skel = document.createElement('div'); skel.className = 'card-skeleton';
      const img = document.createElement('img'); img.className = 'card-img'; img.alt = row.name;
      imgWrap.append(img, skel);
      img.onload = () => { img.style.opacity = '1'; skel.style.opacity = '0'; setTimeout(() => skel.remove(), 500); };
      img.onerror = () => skel.remove();
      img.src = row.image;
    } else {
      const lbl = document.createElement('div'); lbl.className = 'card-no-label';
      lbl.innerHTML = '<p>' + (row.name || '').slice(0, 14) + '</p>';
      imgWrap.appendChild(lbl);
    }

    const menuBtn = document.createElement('button'); menuBtn.className = 'card-menu-btn'; menuBtn.setAttribute('aria-label', 'Actions');
    menuBtn.innerHTML = '<svg viewBox="0 0 16 4"><circle cx="2" cy="2" r="1.5"/><circle cx="8" cy="2" r="1.5"/><circle cx="14" cy="2" r="1.5"/></svg>';
    menuBtn.addEventListener('click', e => { e.stopPropagation(); openAction(row); });
    menuBtn.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    menuBtn.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    imgWrap.appendChild(menuBtn);

    const info = document.createElement('div'); info.className = 'card-info';
    info.innerHTML = '<p class="card-name">' + row.name + '</p><p class="card-brand">' + (row.brand || '') + '</p><span class="vibe-badge ' + cls + '">' + v + '</span>';
    card.append(imgWrap, info);
    card.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    card.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    setTimeout(() => card.classList.add('in'), delay);
    return card;
  }

  function countVibes(rows) {
    const o = { eat: 0, mid: 0, never: 0 };
    for (const r of rows) {
      const k = r.vibe === 'eat' || r.vibe === 'mid' || r.vibe === 'never' ? r.vibe : 'mid';
      o[k]++;
    }
    return o;
  }

  function renderVizHalf(barEl, legendEl, counts) {
    barEl.innerHTML = '';
    legendEl.innerHTML = '';
    const half = barEl.closest('.wh-viz-half');
    half.querySelectorAll('.wh-viz-empty').forEach(n => n.remove());
    const t = counts.eat + counts.mid + counts.never;
    if (t === 0) {
      const p = document.createElement('p');
      p.className = 'wh-viz-empty';
      p.textContent = 'No logs yet';
      const title = half.querySelector('.wh-viz-title');
      title.insertAdjacentElement('afterend', p);
      return;
    }
    const pe = (counts.eat / t) * 100, pm = (counts.mid / t) * 100, pn = (counts.never / t) * 100;
    ['eat','mid','never'].forEach(key => {
      const seg = document.createElement('div');
      seg.className = 'wh-viz-seg ' + key;
      seg.style.width = (key === 'eat' ? pe : key === 'mid' ? pm : pn) + '%';
      barEl.appendChild(seg);
    });
    legendEl.innerHTML = '<span>Would Eat Again<i>' + counts.eat + '</i></span><span>Mid<i>' + counts.mid + '</i></span><span>Never Again<i>' + counts.never + '</i></span>';
  }

  async function render() {
    const { data, error } = await sb.from('ratings').select('*').eq('user_id', user.id).order('logged_at', { ascending: false });
    const rows = (!error && data) ? data : [];
    const mainEl = document.getElementById('warehouse-main');
    const snackScroll = document.getElementById('snack-scroll');
    const drinkScroll = document.getElementById('drink-scroll');

    document.getElementById('stat-total').textContent = String(rows.length);
    const snacks = rows.filter(r => r.kind !== 'drink');
    const drinks = rows.filter(r => r.kind === 'drink');
    document.getElementById('stat-snacks').textContent = String(snacks.length);
    document.getElementById('stat-drinks').textContent = String(drinks.length);

    snackScroll.innerHTML = '';
    drinkScroll.innerHTML = '';
    snacks.forEach((s, i) => snackScroll.appendChild(buildCard(s, i * 50)));
    drinks.forEach((s, i) => drinkScroll.appendChild(buildCard(s, i * 50)));
    if (snacks.length > 1) snackScroll.firstElementChild?.classList.add('featured');
    if (drinks.length > 1) drinkScroll.firstElementChild?.classList.add('featured');

    renderVizHalf(document.getElementById('viz-snack-bar'), document.getElementById('viz-snack-legend'), countVibes(snacks));
    renderVizHalf(document.getElementById('viz-drink-bar'), document.getElementById('viz-drink-legend'), countVibes(drinks));

    if (rows.length) {
      mainEl.classList.add('main-has-items');
      document.getElementById('empty-main').classList.remove('show');
    } else {
      mainEl.classList.remove('main-has-items');
      document.getElementById('empty-main').classList.add('show');
    }
  }

  render();

  const navBtn = document.getElementById('nav-username');
  const navDrop = document.getElementById('nav-dropdown');
  navBtn.addEventListener('click', e => { e.stopPropagation(); navDrop.classList.toggle('open'); });
  document.addEventListener('click', () => navDrop.classList.remove('open'));

  document.querySelectorAll('.nav-links a, .logo, .nav-username, .empty-cta').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });
}
</script>
<script src="js/cursor.js"></script>
</body>
</html>
