<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snacc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<style>
.empty { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; padding: 3rem 2rem; animation: fadeIn .6s ease; }
.empty.show { display: flex; }
.empty-heading { font-family: 'Bitcount Prop Single', monospace; font-size: clamp(3rem, 10vw, 7rem); font-weight: 700; line-height: .9; letter-spacing: -.02em; margin-bottom: 1.5rem; }
.empty-sub { font-size: 0.72rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 2.5rem; line-height: 1.8; }
.empty-cta { display: inline-flex; align-items: center; gap: .6rem; background: var(--ink); color: var(--bg); padding: 1rem 2.2rem; text-decoration: none; font-size: 0.7rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; cursor: none; transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
.empty-cta:hover { transform: scale(1.05); }
.empty-cta svg { width: 13px; height: 13px; stroke: var(--bg); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.grid-wrap { padding: 2.5rem 3.5rem 5rem; max-width: 900px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.card { position: relative; aspect-ratio: 1/1; overflow: hidden; cursor: none; opacity: 0; transform: translateY(24px); transition: opacity .5s ease, transform .6s cubic-bezier(.16,1,.3,1); transform-style: preserve-3d; will-change: transform; background: var(--card-bg); border-radius: 4px; }
.card.in { opacity: 1; transform: translateY(0); }
.card-color { position: absolute; inset: 0; z-index: 1; border-radius: 4px; opacity: 0; transition: opacity .55s cubic-bezier(.25,1,.5,1); }
.card:hover .card-color { opacity: 1; }
.card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 12%; display: block; opacity: 0; transition: opacity .5s ease, transform .55s cubic-bezier(.25,1,.5,1); filter: drop-shadow(0 6px 14px rgba(0,0,0,.15)); z-index: 2; }
.card:hover .card-img { transform: scale(1.09) translateY(-3%); filter: drop-shadow(0 14px 30px rgba(0,0,0,.5)); }
.card-no-img-label { position: absolute; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card-no-img-label p { font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--ink); text-align: center; line-height: 1.4; transition: color .4s ease; }
.card:hover .card-no-img-label p { color: rgba(255,255,255,.85); }
.card-skeleton { position: absolute; inset: 0; z-index: 3; border-radius: 4px; background: linear-gradient(90deg, rgba(0,0,0,.03) 0%, rgba(0,0,0,.07) 50%, rgba(0,0,0,.03) 100%); background-size: 200% 100%; animation: shimmer 1.6s infinite; transition: opacity .4s ease; }
.card-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: .85rem; background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.1) 55%, transparent 100%); opacity: 0; transform: translateY(5px); transition: opacity .3s ease, transform .3s ease; z-index: 4; border-radius: 4px; }
.card:hover .card-overlay { opacity: 1; transform: translateY(0); }
.card-brand { font-size: 0.5rem; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.42); margin-bottom: .18rem; }
.card-name { font-size: .78rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #fff; line-height: 1.2; }
.vibe-badge { display: inline-block; margin-top: .5rem; padding: .18rem .6rem; border-radius: 100px; font-size: 0.5rem; letter-spacing: .14em; text-transform: uppercase; font-weight: 600; width: fit-content; }
.vibe-eat   { background: rgba(100,220,130,.2); color: #7DEBA0; border: 1px solid rgba(100,220,130,.3); }
.vibe-mid   { background: rgba(255,200,60,.18); color: #FFD060; border: 1px solid rgba(255,200,60,.25); }
.vibe-never { background: rgba(255,70,70,.2);   color: #FF8A8A; border: 1px solid rgba(255,70,70,.28); }
.card-delete { position: absolute; top: .5rem; right: .5rem; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,.5); border: none; display: flex; align-items: center; justify-content: center; cursor: none; z-index: 5; opacity: 0; transition: opacity .2s, transform .2s, background .2s; }
.card:hover .card-delete { opacity: 1; }
.card-delete:hover { transform: scale(1.15); background: rgba(200,50,50,.85); }
.card-delete svg { width: 9px; height: 9px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; }
.popup-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s ease, background .3s ease; }
.popup-backdrop.show { opacity: 1; pointer-events: all; background: rgba(0,0,0,.45); }
.popup { background: var(--bg); padding: 2.5rem 2.5rem 2rem; max-width: 320px; width: 90%; transform: translateY(20px) scale(.97); transition: transform .35s cubic-bezier(.16,1,.3,1); }
.popup-backdrop.show .popup { transform: translateY(0) scale(1); }
.popup-label { font-size: 0.6rem; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-bottom: .6rem; }
.popup-heading { font-family: 'Bitcount Prop Single', monospace; font-size: 1.8rem; font-weight: 700; line-height: 1; letter-spacing: -.01em; margin-bottom: .75rem; }
.popup-sub { font-size: 0.68rem; color: var(--muted); letter-spacing: .04em; line-height: 1.6; margin-bottom: 2rem; }
.popup-name { font-weight: 700; color: var(--ink); }
.popup-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.popup-cancel { padding: .85rem; background: transparent; border: 1px solid var(--border); font-family: inherit; font-size: 0.65rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ink); cursor: none; transition: border-color .2s, background .2s; }
.popup-cancel:hover { background: rgba(17,17,17,.06); border-color: var(--ink); }
.popup-confirm { padding: .85rem; background: var(--ink); border: 1px solid var(--ink); font-family: inherit; font-size: 0.65rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--bg); cursor: none; transition: transform .25s cubic-bezier(.34,1.56,.64,1); }
.popup-confirm:hover { transform: scale(1.04); }
@media (max-width: 700px) {
  .grid-wrap { padding: 1.5rem 1.25rem 4rem; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
}
</style>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<nav>
  <a href="index.html" class="logo">Snacc.</a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">My Snaccs</a></li>
    <li><a href="log.html">Log a Snacc</a></li>
    <li><span class="nav-username" id="nav-username"></span></li>
  </ul>
</nav>
<div class="empty" id="empty">
  <p class="empty-heading">Nothing<br>yet.</p>
  <p class="empty-sub">You haven't logged any snaccs.<br>Get eating.</p>
  <a href="log.html" class="empty-cta">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Log your first snacc
  </a>
</div>
<div class="grid-wrap"><div class="grid" id="grid"></div></div>
<div class="popup-backdrop" id="popup-backdrop">
  <div class="popup">
    <p class="popup-label">Are you sure?</p>
    <p class="popup-heading">Delete<br>this snacc?</p>
    <p class="popup-sub">You're about to remove <span class="popup-name" id="popup-name"></span> from your snaccs. This can't be undone.</p>
    <div class="popup-actions">
      <button class="popup-cancel" id="popup-cancel">Keep it</button>
      <button class="popup-confirm" id="popup-confirm">Delete it</button>
    </div>
  </div>
</div>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('nav-username').textContent = '@' + user.username;

  const vibeMap = {
    eat:   { label:'Would Eat Again', cls:'vibe-eat'   },
    mid:   { label:'Mid',             cls:'vibe-mid'   },
    never: { label:'Never Again',     cls:'vibe-never' },
  };
  const noImgColors = ['#1a2a4a','#3a1a1a','#1a3a1a','#2a1a3a','#3a2a1a','#1a3a3a'];

  let pendingDelete = null;
  const backdrop  = document.getElementById('popup-backdrop');
  const popupName = document.getElementById('popup-name');

  function openPopup(id, name, card) { pendingDelete={id,card}; popupName.textContent=name; backdrop.classList.add('show'); }
  function closePopup() { backdrop.classList.remove('show'); pendingDelete=null; }

  document.getElementById('popup-cancel').addEventListener('click', closePopup);
  backdrop.addEventListener('click', e => { if(e.target===backdrop) closePopup(); });

  document.getElementById('popup-confirm').addEventListener('click', async () => {
    if (!pendingDelete) return;
    const {id, card} = pendingDelete;
    closePopup();
    card.style.transition = 'opacity .35s ease, transform .35s ease';
    card.style.opacity = '0'; card.style.transform = 'scale(.92)';
    await sb.from('ratings').delete().eq('id', id);
    setTimeout(() => {
      card.remove();
      if (!document.getElementById('grid').children.length) document.getElementById('empty').classList.add('show');
    }, 380);
  });

  ['popup-cancel','popup-confirm'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('mouseenter', ()=>document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', ()=>document.body.classList.remove('hovering'));
  });

  function buildCard(snack, delay) {
    const v = vibeMap[snack.vibe] || vibeMap.mid;
    const card = document.createElement('div'); card.className = 'card';
    const colorLayer = document.createElement('div'); colorLayer.className = 'card-color';
    const overlay = document.createElement('div'); overlay.className = 'card-overlay';
    overlay.innerHTML = `<p class="card-brand">${snack.brand||''}</p><p class="card-name">${snack.name}</p><span class="vibe-badge ${v.cls}">${v.label}</span>`;
    const delBtn = document.createElement('button'); delBtn.className = 'card-delete';
    delBtn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    delBtn.addEventListener('click', e => { e.stopPropagation(); openPopup(snack.id, snack.name, card); });
    delBtn.addEventListener('mouseenter', ()=>document.body.classList.add('hovering'));
    delBtn.addEventListener('mouseleave', ()=>document.body.classList.remove('hovering'));

    if (!snack.image) {
      const idx = (snack.name||'').charCodeAt(0) % noImgColors.length;
      colorLayer.style.backgroundColor = noImgColors[idx];
      const noImgLabel = document.createElement('div'); noImgLabel.className = 'card-no-img-label';
      noImgLabel.innerHTML = `<p>${snack.name}</p>`;
      card.append(colorLayer, noImgLabel, overlay, delBtn);
    } else {
      const skel = document.createElement('div'); skel.className = 'card-skeleton';
      const img  = document.createElement('img');  img.className  = 'card-img';
      img.alt = snack.name;
      card.append(colorLayer, img, skel, overlay, delBtn);
      img.onload  = () => { img.style.opacity='1'; skel.style.opacity='0'; setTimeout(()=>skel.remove(),500); };
      img.onerror = () => { skel.remove(); colorLayer.style.backgroundColor = noImgColors[(snack.name||'').charCodeAt(0)%noImgColors.length]; };
      img.src = snack.image;
    }

    card.addEventListener('mousemove', e => {
      const r=card.getBoundingClientRect();
      const rx=((e.clientY-r.top)/r.height-.5)*12;
      const ry=-((e.clientX-r.left)/r.width-.5)*12;
      card.style.transition='transform .08s ease, opacity .5s ease';
      card.style.transform=`perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.02)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transition='transform .55s cubic-bezier(.16,1,.3,1), opacity .5s ease';
      card.style.transform='perspective(800px) rotateX(0) rotateY(0) scale(1)';
    });
    card.addEventListener('mouseenter', ()=>document.body.classList.add('hovering'));
    card.addEventListener('mouseleave', ()=>document.body.classList.remove('hovering'));
    setTimeout(()=>card.classList.add('in'), delay);
    return card;
  }

  async function render() {
    const grid  = document.getElementById('grid');
    const empty = document.getElementById('empty');
    grid.innerHTML = '';
    const {data, error} = await sb.from('ratings').select('*').eq('user_id', user.id).order('logged_at', {ascending:false});
    if (error || !data || !data.length) { empty.classList.add('show'); return; }
    empty.classList.remove('show');
    data.forEach((s,i) => grid.appendChild(buildCard(s, i*70)));
  }

  render();

  document.querySelectorAll('.nav-links a, .logo, .empty-cta, .nav-username').forEach(el => {
    el.addEventListener('mouseenter', ()=>document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', ()=>document.body.classList.remove('hovering'));
  });
}
</script>
<script src="js/cursor.js"></script>
</body>
</html>
