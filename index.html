<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snacc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #EEEBE3;
  --card-bg: #F5F3EE;
  --ink: #111111;
  --muted: rgba(17,17,17,0.38);
  --border: rgba(17,17,17,0.12);
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  cursor: none;
  overflow-x: hidden;
  min-height: 100vh;
}

#cur-dot {
  width: 7px; height: 7px; background: var(--ink);
  border-radius: 50%; position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .2s, height .2s;
}
#cur-ring {
  width: 38px; height: 38px; border: 1.5px solid var(--ink);
  border-radius: 50%; position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%,-50%);
  transition: width .3s, height .3s, opacity .3s;
}
body.hovering #cur-dot { width: 12px; height: 12px; }
body.hovering #cur-ring { width: 54px; height: 54px; opacity: .35; }

nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.6rem 2.5rem; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg); z-index: 100;
}
.logo {
  font-family: 'Bitcount Prop Single', monospace;
  font-size: 2rem; font-weight: 700; color: var(--ink);
  text-decoration: none; cursor: none;
}
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a {
  font-size: 0.68rem; font-weight: 500; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--ink);
  text-decoration: none; cursor: none; position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -2px; left: 0;
  width: 0; height: 1px; background: var(--ink);
  transition: width .35s cubic-bezier(.25,1,.5,1);
}
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

.empty {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 70vh; text-align: center; padding: 3rem 2rem;
  animation: fadeIn .6s ease;
}
.empty.show { display: flex; }
@keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.empty-heading {
  font-family: 'Bitcount Prop Single', monospace;
  font-size: clamp(3rem, 10vw, 7rem); font-weight: 700;
  line-height: .9; letter-spacing: -.02em; margin-bottom: 1.5rem;
}
.empty-sub {
  font-size: 0.72rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 2.5rem; line-height: 1.8;
}
.empty-cta {
  display: inline-flex; align-items: center; gap: .6rem;
  background: var(--ink); color: var(--bg); padding: 1rem 2.2rem;
  text-decoration: none; font-size: 0.7rem; font-weight: 600;
  letter-spacing: .18em; text-transform: uppercase; cursor: none;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.empty-cta:hover { transform: scale(1.05); }
.empty-cta svg {
  width: 13px; height: 13px; stroke: var(--bg); fill: none;
  stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
}

.grid-wrap {
  padding: 2.5rem 3.5rem 5rem;
  max-width: 900px;
  margin: 0 auto;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.card {
  position: relative; aspect-ratio: 1/1; overflow: hidden;
  cursor: none; opacity: 0; transform: translateY(24px);
  transition: opacity .5s ease, transform .6s cubic-bezier(.16,1,.3,1);
  transform-style: preserve-3d; will-change: transform;
  background: var(--card-bg); border-radius: 4px;
}
.card.in { opacity: 1; transform: translateY(0); }

.card-color {
  position: absolute; inset: 0; z-index: 1; border-radius: 4px;
  opacity: 0; transition: opacity .55s cubic-bezier(.25,1,.5,1);
}
.card:hover .card-color { opacity: 1; }

.card-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: contain; padding: 12%; display: block; opacity: 0;
  transition: opacity .5s ease, transform .55s cubic-bezier(.25,1,.5,1);
  filter: drop-shadow(0 6px 14px rgba(0,0,0,.15)); z-index: 2;
}
.card:hover .card-img {
  transform: scale(1.09) translateY(-3%);
  filter: drop-shadow(0 14px 30px rgba(0,0,0,.5));
}

.card-no-img-label {
  position: absolute; inset: 0; z-index: 2;
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.card-no-img-label p {
  font-size: .72rem; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink); text-align: center;
  line-height: 1.4; transition: color .4s ease;
}
.card:hover .card-no-img-label p { color: rgba(255,255,255,.85); }

.card-skeleton {
  position: absolute; inset: 0; z-index: 3; border-radius: 4px;
  background: linear-gradient(90deg, rgba(0,0,0,.03) 0%, rgba(0,0,0,.07) 50%, rgba(0,0,0,.03) 100%);
  background-size: 200% 100%; animation: shimmer 1.6s infinite;
  transition: opacity .4s ease;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.card-overlay {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; justify-content: flex-end; padding: .85rem;
  background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.1) 55%, transparent 100%);
  opacity: 0; transform: translateY(5px);
  transition: opacity .3s ease, transform .3s ease; z-index: 4; border-radius: 4px;
}
.card:hover .card-overlay { opacity: 1; transform: translateY(0); }

.card-brand {
  font-size: 0.5rem; letter-spacing: .22em;
  text-transform: uppercase; color: rgba(255,255,255,.42); margin-bottom: .18rem;
}
.card-name {
  font-size: .78rem; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase; color: #fff; line-height: 1.2;
}
.vibe-badge {
  display: inline-block; margin-top: .5rem; padding: .18rem .6rem;
  border-radius: 100px; font-size: 0.5rem; letter-spacing: .14em;
  text-transform: uppercase; font-weight: 600; width: fit-content;
}
.vibe-eat   { background: rgba(100,220,130,.2); color: #7DEBA0; border: 1px solid rgba(100,220,130,.3); }
.vibe-mid   { background: rgba(255,200,60,.18); color: #FFD060; border: 1px solid rgba(255,200,60,.25); }
.vibe-never { background: rgba(255,70,70,.2);   color: #FF8A8A; border: 1px solid rgba(255,70,70,.28); }

.card-delete {
  position: absolute; top: .5rem; right: .5rem;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,.5); border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: none; z-index: 5; opacity: 0;
  transition: opacity .2s, transform .2s, background .2s;
}
.card:hover .card-delete { opacity: 1; }
.card-delete:hover { transform: scale(1.15); background: rgba(200,50,50,.85); }
.card-delete svg {
  width: 9px; height: 9px; stroke: #fff; fill: none;
  stroke-width: 2.5; stroke-linecap: round;
}

.popup-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease, background .3s ease;
}
.popup-backdrop.show { opacity: 1; pointer-events: all; background: rgba(0,0,0,.45); }

.popup {
  background: var(--bg); padding: 2.5rem 2.5rem 2rem;
  max-width: 320px; width: 90%;
  transform: translateY(20px) scale(.97);
  transition: transform .35s cubic-bezier(.16,1,.3,1);
}
.popup-backdrop.show .popup { transform: translateY(0) scale(1); }

.popup-label {
  font-size: 0.6rem; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted); margin-bottom: .6rem;
}
.popup-heading {
  font-family: 'Bitcount Prop Single', monospace;
  font-size: 1.8rem; font-weight: 700; line-height: 1;
  letter-spacing: -.01em; margin-bottom: .75rem;
}
.popup-sub {
  font-size: 0.68rem; color: var(--muted); letter-spacing: .04em;
  line-height: 1.6; margin-bottom: 2rem;
}
.popup-name { font-weight: 700; color: var(--ink); }
.popup-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.popup-cancel {
  padding: .85rem; background: transparent;
  border: 1px solid var(--border); font-family: inherit;
  font-size: 0.65rem; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase; color: var(--ink); cursor: none;
  transition: border-color .2s, background .2s;
}
.popup-cancel:hover { background: rgba(17,17,17,.06); border-color: var(--ink); }
.popup-confirm {
  padding: .85rem; background: var(--ink);
  border: 1px solid var(--ink); font-family: inherit;
  font-size: 0.65rem; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase; color: var(--bg); cursor: none;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}
.popup-confirm:hover { transform: scale(1.04); }

@media (max-width: 700px) {
  body { cursor: auto; }
  #cur-dot, #cur-ring { display: none; }
  nav { padding: 1.25rem; }
  .nav-links { gap: 1.5rem; }
  .grid-wrap { padding: 1.5rem 1.25rem 4rem; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
}
</style>
</head>
<body>

<div id="cur-dot"></div>
<div id="cur-ring"></div>

<nav>
  <a href="index.html" class="logo">Snacc.</a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">My Snaccs</a></li>
    <li><a href="log.html">Log a Snacc</a></li>
  </ul>
</nav>

<div class="empty" id="empty">
  <p class="empty-heading">Nothing<br>yet.</p>
  <p class="empty-sub">You haven't logged any snaccs.<br>Get eating.</p>
  <a href="log.html" class="empty-cta">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Log your first snacc
  </a>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="popup-backdrop" id="popup-backdrop">
  <div class="popup">
    <p class="popup-label">Are you sure?</p>
    <p class="popup-heading">Delete<br>this snacc?</p>
    <p class="popup-sub">You're about to remove <span class="popup-name" id="popup-name"></span> from your snaccs. This can't be undone.</p>
    <div class="popup-actions">
      <button class="popup-cancel" id="popup-cancel">Keep it</button>
      <button class="popup-confirm" id="popup-confirm">Delete it</button>
    </div>
  </div>
</div>

<script>
// ── Supabase config ──
const SUPABASE_URL  = 'https://apxhycmiqtwbrpcwgaag.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFweGh5Y21pcXR3YnJwY3dnYWFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDcyMDIsImV4cCI6MjA4OTMyMzIwMn0.xbGX_zLzrYVdUWDOhPzi8Dyz4ZZ4apdLNLZF2vJU2Vg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  global: {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`
    }
  }
});  
// ── Helpers ──
function proxied(url) { return url; }

async function getDominantColor(img) {
  return new Promise(resolve => {
    try {
      const canvas = document.createElement('canvas');
      const size = 80; canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      const { data } = ctx.getImageData(0, 0, size, size);
      const buckets = {};
      for (let i = 0; i < data.length; i += 4) {
        const r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
        if (a < 180) continue;
        const br = (r+g+b)/3;
        if (br > 228 || br < 18) continue;
        const key = `${Math.round(r/18)*18},${Math.round(g/18)*18},${Math.round(b/18)*18}`;
        buckets[key] = (buckets[key]||0)+1;
      }
      let best=null,max=0;
      for (const [k,v] of Object.entries(buckets)) { if(v>max){max=v;best=k;} }
      if (!best) { resolve(null); return; }
      const [r,g,b] = best.split(',').map(Number);
      const f = 0.72;
      resolve(`rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`);
    } catch { resolve(null); }
  });
}

const vibeMap = {
  eat:   { label:'Would Eat Again', cls:'vibe-eat'   },
  mid:   { label:'Mid',             cls:'vibe-mid'   },
  never: { label:'Never Again',     cls:'vibe-never' },
};
const noImgColors = ['#1a2a4a','#3a1a1a','#1a3a1a','#2a1a3a','#3a2a1a','#1a3a3a'];

// ── Delete popup ──
let pendingDelete = null;
const backdrop  = document.getElementById('popup-backdrop');
const popupName = document.getElementById('popup-name');

function openPopup(id, name, card) {
  pendingDelete = { id, card };
  popupName.textContent = name;
  backdrop.classList.add('show');
}
function closePopup() {
  backdrop.classList.remove('show');
  pendingDelete = null;
}

document.getElementById('popup-cancel').addEventListener('click', closePopup);
backdrop.addEventListener('click', e => { if (e.target === backdrop) closePopup(); });

document.getElementById('popup-confirm').addEventListener('click', async () => {
  if (!pendingDelete) return;
  const { id, card } = pendingDelete;
  closePopup();

  card.style.transition = 'opacity .35s ease, transform .35s ease';
  card.style.opacity = '0';
  card.style.transform = 'scale(.92)';

  await sb.from('ratings').delete().eq('id', id);

  setTimeout(() => {
    card.remove();
    if (!document.getElementById('grid').children.length) {
      document.getElementById('empty').classList.add('show');
    }
  }, 380);
});

['popup-cancel','popup-confirm'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
});

// ── Build card ──
function buildCard(snack, delay) {
  const v    = vibeMap[snack.vibe] || vibeMap.mid;
  const card = document.createElement('div');
  card.className = 'card';

  const colorLayer = document.createElement('div');
  colorLayer.className = 'card-color';

  const overlay = document.createElement('div');
  overlay.className = 'card-overlay';
  overlay.innerHTML = `
    <p class="card-brand">${snack.brand||''}</p>
    <p class="card-name">${snack.name}</p>
    <span class="vibe-badge ${v.cls}">${v.label}</span>
  `;

  const delBtn = document.createElement('button');
  delBtn.className = 'card-delete';
  delBtn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  delBtn.addEventListener('click', e => { e.stopPropagation(); openPopup(snack.id, snack.name, card); });
  delBtn.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  delBtn.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));

  if (!snack.image) {
    const idx = (snack.name||'').charCodeAt(0) % noImgColors.length;
    colorLayer.style.backgroundColor = noImgColors[idx];
    const noImgLabel = document.createElement('div');
    noImgLabel.className = 'card-no-img-label';
    noImgLabel.innerHTML = `<p>${snack.name}</p>`;
    card.append(colorLayer, noImgLabel, overlay, delBtn);
  } else {
    const skel = document.createElement('div'); skel.className = 'card-skeleton';
    const img  = document.createElement('img'); img.className = 'card-img';
    img.alt = snack.name;
    card.append(colorLayer, img, skel, overlay, delBtn);

    img.src = proxied(snack.image);
    img.onload = async () => {
      img.style.opacity = '1';
      skel.style.opacity = '0';
      setTimeout(() => skel.remove(), 500);
      const color = await getDominantColor(img);
      if (color) colorLayer.style.backgroundColor = color;
    };
    img.onerror = () => {
      img.crossOrigin = null; img.src = snack.image;
      img.onload  = () => { img.style.opacity='1'; skel.remove(); };
      img.onerror = () => {
        skel.remove();
        colorLayer.style.backgroundColor = noImgColors[(snack.name||'').charCodeAt(0) % noImgColors.length];
      };
    };
  }

  card.addEventListener('mousemove', e => {
    const r  = card.getBoundingClientRect();
    const rx = ((e.clientY - r.top)  / r.height - .5) * 12;
    const ry = -((e.clientX - r.left) / r.width  - .5) * 12;
    card.style.transition = 'transform .08s ease, opacity .5s ease';
    card.style.transform  = `perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.02)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.transition = 'transform .55s cubic-bezier(.16,1,.3,1), opacity .5s ease';
    card.style.transform  = 'perspective(800px) rotateX(0) rotateY(0) scale(1)';
  });
  card.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  card.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));

  setTimeout(() => card.classList.add('in'), delay);
  return card;
}

// ── Render from Supabase ──
async function render() {
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';

  const { data, error } = await sb
    .from('ratings')
    .select('*')
    .order('logged_at', { ascending: false });

  if (error || !data || !data.length) {
    empty.classList.add('show');
    return;
  }

  empty.classList.remove('show');
  data.forEach((s, i) => grid.appendChild(buildCard(s, i * 70)));
}

render();

document.querySelectorAll('.nav-links a, .logo, .empty-cta').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
});

const dot  = document.getElementById('cur-dot');
const ring = document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
dot.style.left=dot.style.top='-100px';
ring.style.left=ring.style.top='-100px';
(function loop(){
  rx+=(mx-rx)*.13; ry+=(my-ry)*.13;
  dot.style.left=mx+'px'; dot.style.top=my+'px';
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
