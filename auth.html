<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snacc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<style>
.auth-page { display: flex; flex-direction: column; justify-content: center; min-height: calc(100vh - 73px); padding: 3rem 2.5rem; max-width: 480px; margin: 0 auto; }
.auth-heading { font-family: 'Bitcount Prop Single', monospace; font-size: clamp(2.8rem, 8vw, 4.8rem); font-weight: 700; line-height: 1.1; letter-spacing: -.02em; margin-bottom: 2.5rem; padding-top: 0.1em; min-height: 2.5em; -webkit-font-smoothing: antialiased; }
.auth-heading span { display: block; transition: opacity .25s ease, transform .25s cubic-bezier(.16,1,.3,1); }
.auth-heading span.hidden { opacity: 0; transform: translateY(8px); position: absolute; pointer-events: none; }
.auth-input-wrap { position: relative; margin-bottom: .25rem; }
.auth-input { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid var(--ink); padding: .9rem 0; font-size: 1.4rem; font-family: inherit; font-weight: 500; color: var(--ink); outline: none; cursor: none; caret-color: var(--ink); }
.auth-input::placeholder { color: rgba(17,17,17,.2); }
.auth-checking { position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: .55rem; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); opacity: 0; transition: opacity .2s; }
.auth-checking.show { opacity: 1; }
.auth-error { font-size: 0.63rem; letter-spacing: .1em; color: #c0392b; margin-top: .6rem; min-height: 1em; }
.auth-btn { display: flex; align-items: center; justify-content: center; gap: .75rem; width: 100%; background: var(--ink); color: var(--bg); border: none; padding: 1rem 2rem; font-family: inherit; font-size: 0.7rem; font-weight: 600; letter-spacing: .1em; cursor: none; margin-top: 1.5rem; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .2s; }
.auth-btn:hover { transform: scale(1.02); }
.auth-btn:disabled { opacity: .35; pointer-events: none; transform: none; }
.auth-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
@media (max-width: 700px) { .auth-input { font-size: 1.1rem; } }
</style>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<nav>
  <a href="auth.html" class="logo">Snacc.</a>
</nav>
<div class="auth-page">
  <h1 class="auth-heading" id="auth-heading"><span>Who are<br>you?</span></h1>
  <div class="auth-input-wrap">
    <input class="auth-input" id="username-input" type="text" placeholder="username" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="20"/>
    <span class="auth-checking" id="auth-checking">Checking…</span>
  </div>
  <p class="auth-error" id="auth-error"></p>
  <button class="auth-btn" id="auth-btn" disabled>
    <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/><path d="M2 20c0-3.5 4.5-6 10-6s10 2.5 10 6"/></svg>
    <span id="auth-btn-label">Continue with Touch ID</span>
  </button>
</div>
<script>
if (getUser()) window.location.replace('feed.html');

function getAuthLabel() {
  const ua = navigator.userAgent;
  if (/iPhone|iPad/.test(ua)) return 'Face ID';
  if (/Macintosh/.test(ua)) return 'Touch ID';
  if (/Windows/.test(ua)) return 'Windows Hello';
  return 'passkey';
}
const authLabel = getAuthLabel();

const input    = document.getElementById('username-input');
const btn      = document.getElementById('auth-btn');
const btnLabel = document.getElementById('auth-btn-label');
const heading  = document.getElementById('auth-heading');
const errEl    = document.getElementById('auth-error');
const checking = document.getElementById('auth-checking');

let _mode = 'empty'; // 'empty' | 'new' | 'existing'
let _debounce = null;

function setHeading(html) {
  heading.innerHTML = `<span>${html}</span>`;
}

function setMode(mode, username) {
  _mode = mode;
  errEl.textContent = '';
  if (mode === 'empty') {
    setHeading('Who are<br>you?');
    btnLabel.textContent = `Continue with ${authLabel}`;
    btn.disabled = true;
  } else if (mode === 'existing') {
    setHeading(`Welcome<br>back, @${username}.`);
    btnLabel.textContent = `Sign in with ${authLabel}`;
    btn.disabled = false;
  } else if (mode === 'new') {
    setHeading(`Join as<br>@${username}.`);
    btnLabel.textContent = `Get started with ${authLabel}`;
    btn.disabled = false;
  }
}

input.addEventListener('input', () => {
  const val = input.value.trim().toLowerCase();
  clearTimeout(_debounce);
  errEl.textContent = '';

  if (!val) { setMode('empty'); return; }

  if (!/^[a-z0-9_]{1,20}$/.test(val)) {
    btn.disabled = true;
    setHeading('Who are<br>you?');
    errEl.textContent = 'Letters, numbers, underscores only.';
    return;
  }

  checking.classList.add('show');
  btn.disabled = true;

  _debounce = setTimeout(async () => {
    const { data } = await sb.from('users').select('id').eq('username', val).maybeSingle();
    checking.classList.remove('show');
    setMode(data ? 'existing' : 'new', val);
  }, 480);
});

btn.addEventListener('click', async () => {
  const username = input.value.trim().toLowerCase();
  errEl.textContent = '';
  btn.disabled = true;
  const original = btnLabel.textContent;
  btnLabel.textContent = _mode === 'existing' ? 'Signing in…' : 'Setting up…';

  try {
    if (_mode === 'existing') {
      await loginPasskey();
    } else {
      if (!/^[a-z0-9_]{2,20}$/.test(username)) throw new Error('Username must be 2–20 chars: letters, numbers, underscores.');
      await registerPasskey(username);
    }
    window.location.replace('feed.html');
  } catch(e) {
    errEl.textContent = e.message || 'Something went wrong.';
    btn.disabled = false;
    btnLabel.textContent = original;
  }
});

document.querySelectorAll('.auth-btn, .logo').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
});
input.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
input.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
</script>
<script src="js/cursor.js"></script>
</body>
</html>
