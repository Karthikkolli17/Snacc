<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snacc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<style>
.auth-page { display: flex; flex-direction: column; justify-content: center; min-height: calc(100vh - 73px); padding: 3rem 2.5rem; max-width: 480px; margin: 0 auto; }
.auth-heading { font-family: 'Bitcount Prop Single', monospace; font-size: clamp(2.8rem, 8vw, 4.8rem); font-weight: 700; line-height: 1.1; letter-spacing: -.02em; margin-bottom: 2.5rem; padding-top: 0.1em; -webkit-font-smoothing: antialiased; }
.auth-status { font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-top: .5rem; opacity: 0; transition: opacity .4s ease; }
.auth-status.show { opacity: 1; }
.auth-btn-secondary { display: flex; align-items: center; justify-content: center; gap: .75rem; width: 100%; background: transparent; color: var(--ink); border: 1.5px solid var(--ink); padding: 1rem 2rem; font-family: inherit; font-size: 0.7rem; font-weight: 600; letter-spacing: .1em; cursor: none; margin-top: .75rem; transition: transform .3s cubic-bezier(.34,1.56,.64,1), background .2s; }
.auth-btn-secondary:hover { transform: scale(1.02); background: rgba(17,17,17,.05); }
.auth-btn-secondary svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.auth-input-wrap { position: relative; margin-bottom: .25rem; }
.auth-input { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid var(--ink); padding: .9rem 0; font-size: 1.4rem; font-family: inherit; font-weight: 500; color: var(--ink); outline: none; cursor: none; caret-color: var(--ink); }
.auth-input::placeholder { color: rgba(17,17,17,.2); }
.auth-checking { position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: .55rem; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); opacity: 0; transition: opacity .2s; }
.auth-checking.show { opacity: 1; }
.auth-error { font-size: 0.63rem; letter-spacing: .1em; color: #c0392b; margin-top: .6rem; min-height: 1em; }
.auth-btn { display: flex; align-items: center; justify-content: center; gap: .75rem; width: 100%; background: var(--ink); color: var(--bg); border: none; padding: 1rem 2rem; font-family: inherit; font-size: 0.7rem; font-weight: 600; letter-spacing: .1em; cursor: none; margin-top: 1.5rem; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .2s; }
.auth-btn:hover { transform: scale(1.02); }
.auth-btn:disabled { opacity: .35; pointer-events: none; transform: none; }
.auth-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.auth-alt-link { display: block; font-size: .55rem; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); background: none; border: none; cursor: none; font-family: inherit; padding: 0; margin-top: 1rem; transition: color .2s; text-align: left; }
.auth-alt-link:hover { color: var(--ink); }
/* PIN pad */
.pin-label { font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-top: 1.5rem; margin-bottom: 1.5rem; }
.pin-dots { display: flex; gap: 1rem; margin-bottom: 2rem; }
.pin-dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid var(--ink); transition: background .12s; }
.pin-dot.filled { background: var(--ink); }
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); max-width: 210px; border: 1px solid var(--border); }
.pin-key { background: var(--bg); border: none; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 1.15rem; font-weight: 500; color: var(--ink); padding: .95rem; cursor: none; transition: background .12s; user-select: none; -webkit-user-select: none; }
.pin-key:nth-child(3n) { border-right: none; }
.pin-key:nth-child(n+10) { border-bottom: none; }
.pin-key:hover { background: rgba(17,17,17,.05); }
.pin-key:active { background: rgba(17,17,17,.12); }
.pin-key-empty { pointer-events: none; }
/* Backup prompt */
.backup-msg { font-size: .72rem; line-height: 1.65; color: var(--ink); margin-top: 1.5rem; margin-bottom: .25rem; }
.backup-sub { font-size: .55rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: .25rem; }
@media (max-width: 700px) { .auth-input { font-size: 1.1rem; } }
</style>
<script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<nav>
  <a href="auth.html" class="logo">Snacc.</a>
  <ul class="nav-links"></ul>
</nav>
<div class="auth-page">
  <h1 class="auth-heading">Who are<br>you?</h1>

  <div class="auth-input-wrap">
    <input class="auth-input" id="username-input" type="text" placeholder="username"
      autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="20"/>
    <span class="auth-checking" id="auth-checking">Checking…</span>
  </div>
  <p class="auth-status" id="auth-status"></p>
  <p class="auth-error" id="auth-error"></p>
  <!-- PIN pad -->
  <div id="pin-section" style="display:none">
    <p class="pin-label" id="pin-label">Choose a 4-digit PIN</p>
    <div class="pin-dots">
      <span class="pin-dot" id="pd0"></span>
      <span class="pin-dot" id="pd1"></span>
      <span class="pin-dot" id="pd2"></span>
      <span class="pin-dot" id="pd3"></span>
    </div>
    <div class="pin-grid" id="pin-grid"></div>
    <button class="auth-alt-link" id="passkey-link" style="display:none"></button>
    <button class="auth-alt-link" id="forgot-pin-link" style="display:none">Forgot PIN?</button>
  </div>

  <!-- After passkey signup: offer PIN backup -->
  <div id="backup-section" style="display:none">
    <p class="backup-msg">You're in. Want to add a PIN as backup?</p>
    <p class="backup-sub">Useful when you're on a new device.</p>
    <button class="auth-btn" id="backup-yes-btn">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Set up PIN backup</span>
    </button>
    <button class="auth-alt-link" id="backup-skip-btn">Skip for now</button>
  </div>
</div>

<script>
if (getUser()) window.location.replace('feed.html');

function getAuthLabel() {
  const ua = navigator.userAgent;
  if (/iPhone|iPad/.test(ua)) return 'Face ID';
  if (/Macintosh/.test(ua)) return 'Touch ID';
  if (/Windows/.test(ua)) return 'Windows Hello';
  return 'passkey';
}
const authLabel = getAuthLabel();

const input       = document.getElementById('username-input');
const errEl       = document.getElementById('auth-error');
const statusEl    = document.getElementById('auth-status');
const checking    = document.getElementById('auth-checking');
const pinSec      = document.getElementById('pin-section');
const pinLabelEl  = document.getElementById('pin-label');
const passkeyLink = document.getElementById('passkey-link');
const backupSec   = document.getElementById('backup-section');

let _mode     = 'empty';   // empty | new | existing
let _userData = null;
let _pinMode  = null;      // setup | confirm | login | backup | backup-confirm
let _pinFirst = '';
let _pinVal   = '';
let _newUserId = null;
let _isReset   = false;
let _debounce  = null;
let _authCheckToken = 0;

function showSection(name) {
  pinSec.style.display    = name === 'pin'    ? 'block' : 'none';
  backupSec.style.display = name === 'backup' ? 'block' : 'none';
}

function showPausedState() {
  checking.classList.remove('show');
  showSection(null);
  statusEl.textContent = 'Snacc is restocking right now.';
  statusEl.classList.add('show');
  errEl.textContent = 'Login is temporarily unavailable while the database is paused.';
}

function updateDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('pd' + i).classList.toggle('filled', i < _pinVal.length);
}

function openPin(mode) {
  _pinMode = mode; _pinVal = '';
  updateDots(); errEl.textContent = '';
  showSection('pin');

  const labels = {
    login:           'Enter your PIN',
    setup:           _isReset ? 'Choose a new PIN' : 'Choose a 4-digit PIN',
    confirm:         'Confirm your PIN',
    backup:          'Choose a backup PIN',
    'backup-confirm':'Confirm your PIN',
  };
  pinLabelEl.textContent = labels[mode] || '';

  document.getElementById('forgot-pin-link').style.display = mode === 'login' ? 'block' : 'none';
  passkeyLink.style.display = 'none';
}

function setMode(mode, userData) {
  _mode = mode; _userData = userData;
  errEl.textContent = ''; _pinVal = ''; _pinFirst = ''; _isReset = false;

  if (mode === 'empty') { statusEl.textContent = ''; statusEl.classList.remove('show'); showSection(null); return; }

  const { username, hasPin } = userData;

  if (mode === 'new') {
    statusEl.textContent = `New here — joining as @${username}`; statusEl.classList.add('show');
    openPin('setup');
    return;
  }

  if (mode === 'existing') {
    statusEl.textContent = `Welcome back, @${username}`; statusEl.classList.add('show');
    openPin(hasPin ? 'login' : 'setup');
  }
}

// Username input
input.addEventListener('input', () => {
  const val = input.value.trim().toLowerCase();
  clearTimeout(_debounce);
  errEl.textContent = '';
  statusEl.textContent = ''; statusEl.classList.remove('show');
  setMode('empty', null);
  if (!val) return;

  if (!/^[a-z0-9_]{1,20}$/.test(val)) {
    errEl.textContent = 'Letters, numbers, underscores only.';
    return;
  }

  checking.classList.add('show');
  _debounce = setTimeout(async () => {
    const token = ++_authCheckToken;
    const pauseTimer = setTimeout(() => {
      if (token === _authCheckToken) showPausedState();
    }, 5000);
    try {
      const profileRes = await fetch(`/api/user-profile?username=${encodeURIComponent(val)}`);
      const profileData = await profileRes.json();
      clearTimeout(pauseTimer);
      if (token !== _authCheckToken) return;
      if (!profileRes.ok) throw new Error(profileData.error || 'Profile lookup failed.');
      checking.classList.remove('show');
      const data = profileData.user;
      if (data) {
        setMode('existing', { username: val, id: data.id, hasPasskey: !!data.has_passkey, hasPin: data.has_pin });
      } else {
        setMode('new', { username: val, hasPasskey: true, hasPin: false });
      }
    } catch(e) {
      clearTimeout(pauseTimer);
      if (token !== _authCheckToken) return;
      showPausedState();
    }
  }, 480);
});

// Forgot PIN link
document.getElementById('forgot-pin-link').addEventListener('click', () => {
  _isReset = true;
  errEl.textContent = '';
  openPin('setup');
});

// Passkey link (from PIN pad — go back, now unused but kept for safety)
passkeyLink.addEventListener('click', () => { errEl.textContent = ''; showSection(null); });

// Backup section
document.getElementById('backup-yes-btn').addEventListener('click', () => openPin('backup'));
document.getElementById('backup-skip-btn').addEventListener('click', () => window.location.replace('feed.html'));

// PIN input handlers
let _pinBusy = false;
async function onDigit(d) {
  if (_pinVal.length >= 4 || _pinBusy) return;
  _pinVal += d; updateDots();
  if (_pinVal.length === 4) { _pinBusy = true; await onPinComplete(); _pinBusy = false; }
}
function onBack() { if (_pinBusy) return; _pinVal = _pinVal.slice(0, -1); updateDots(); }

async function onPinComplete() {
  const username = input.value.trim().toLowerCase();
  errEl.textContent = '';

  if (_pinMode === 'login') {
    try { await loginPin(username, _pinVal); window.location.replace('feed.html'); }
    catch(e) { errEl.textContent = e.message; _pinVal = ''; updateDots(); }

  } else if (_pinMode === 'setup') {
    _pinFirst = _pinVal; openPin('confirm');

  } else if (_pinMode === 'confirm') {
    if (_pinVal !== _pinFirst) {
      _pinFirst = ''; openPin('setup');
      errEl.textContent = "PINs don't match — try again.";
      return;
    }
    try {
      if (_isReset) {
        await resetPin(username, _pinVal);
      } else if (_mode === 'new') {
        await registerPin(username, _pinVal);
      } else {
        await addPinToAccount(_userData.id, username, _pinVal);
        localStorage.setItem('snacc_user', JSON.stringify({ id: _userData.id, username }));
      }
      window.location.replace('feed.html');
    } catch(e) { errEl.textContent = e.message || 'Something went wrong.'; _pinVal = ''; updateDots(); }

  } else if (_pinMode === 'backup') {
    _pinFirst = _pinVal; openPin('backup-confirm');

  } else if (_pinMode === 'backup-confirm') {
    if (_pinVal !== _pinFirst) {
      _pinFirst = ''; openPin('backup');
      errEl.textContent = "PINs don't match — try again.";
      return;
    }
    try { await addPinToAccount(_newUserId, username, _pinVal); } catch(e) { errEl.textContent = e.message || 'Could not save PIN.'; _pinVal = ''; updateDots(); return; }
    window.location.replace('feed.html');
  }
}

// Build numpad
const grid = document.getElementById('pin-grid');
[1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k => {
  const b = document.createElement('button');
  b.className = 'pin-key' + (k === '' ? ' pin-key-empty' : '');
  b.textContent = k === '' ? '' : String(k);
  if (k !== '') {
    b.addEventListener('click', () => k === '⌫' ? onBack() : onDigit(String(k)));
    b.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    b.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  }
  grid.appendChild(b);
});

// Hover states for nav elements
document.querySelectorAll('.auth-btn, .auth-btn-secondary, .logo, .auth-alt-link, .nav-links a').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
});
input.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
input.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
</script>
<script src="js/cursor.js"></script>
</body>
</html>
