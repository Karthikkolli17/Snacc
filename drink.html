<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.catalog-wrap { padding: 2.5rem 3.5rem 6rem; max-width: 1100px; margin: 0 auto; }
.catalog-header { margin-bottom: 2.5rem; }
.catalog-heading { font-family: 'Bitcount Prop Single', monospace; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 700; line-height: 1; letter-spacing: -.02em; margin-bottom: .4rem; }
.catalog-sub { font-size: 0.6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.catalog-grid { display: grid; grid-template-columns: repeat(4, 1fr); border-left: 1px solid var(--border); border-top: 1px solid var(--border); }
.snack-card { background: var(--card-bg); cursor: none; position: relative; overflow: hidden; opacity: 0; transform: translateY(16px); transition: opacity .4s ease, transform .4s cubic-bezier(.16,1,.3,1); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.snack-card.in { opacity: 1; transform: translateY(0); }
.snack-card-img { aspect-ratio: 1/1; position: relative; overflow: hidden; }
.snack-card-img-bg { position: absolute; inset: 0; }
.snack-card-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 12%; filter: drop-shadow(0 4px 12px rgba(0,0,0,.3)); opacity: 0; transition: opacity .4s ease, transform .5s cubic-bezier(.25,1,.5,1); z-index: 1; }
.snack-card:hover .snack-card-img img { transform: scale(1.07); }
.snack-card-no-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 1; }
.snack-card-no-label p { font-size: .65rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.7); text-align: center; line-height: 1.4; }
.snack-card-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.72); display: flex; flex-direction: column; justify-content: center; padding: 1.25rem; opacity: 0; transition: opacity .25s ease; z-index: 2; }
.snack-card:hover .snack-card-overlay { opacity: 1; }
.overlay-bar-row { display: flex; align-items: center; gap: .6rem; padding: .3rem 0; }
.overlay-bar-label { font-size: .5rem; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.55); flex: 1; }
.overlay-bar-count { font-family: 'Bitcount Prop Single', monospace; font-size: 1rem; font-weight: 700; color: #fff; width: 1.4rem; text-align: right; flex-shrink: 0; }
.overlay-bar-track { width: 40px; height: 1px; background: rgba(255,255,255,.15); flex-shrink: 0; }
.overlay-bar-fill { height: 100%; background: rgba(255,255,255,.7); width: 0%; transition: width .6s cubic-bezier(.16,1,.3,1); }
.snack-card-info { padding: .75rem 1rem; border-top: 1px solid var(--border); background: var(--card-bg); }
.snack-card-name { font-size: .72rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .15rem; }
.snack-card-meta { display: flex; align-items: center; justify-content: space-between; }
.snack-card-brand { font-size: .52rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
.snack-card-count { font-size: .52rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.snack-card-country { font-size: .48rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.country-filter { display: flex; align-items: center; gap: .75rem; margin-top: .75rem; flex-wrap: wrap; }
.country-filter-btn { font-size: .55rem; letter-spacing: .14em; text-transform: uppercase; padding: .45rem .8rem; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: none; font-family: inherit; transition: background .08s, color .08s, border-color .08s; }
.country-filter-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.country-filter-btn:hover { border-color: var(--ink); color: var(--ink); }
.catalog-empty { padding: 6rem 0; font-size: .7rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
@media (max-width: 900px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px) {
  .catalog-wrap { padding: 1.5rem 1.25rem 5rem; }
  .catalog-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
<script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<nav>
  <a href="index.html" class="logo">Snacc.</a>
  <ul class="nav-links">
    <li><a href="feed.html">Snaccs</a></li>
    <li><a href="drink.html" class="active">Drinks</a></li>
    <li id="nav-log-li" style="display:none"><a href="log.html">Log an Item</a></li>
    <li class="nav-profile" id="nav-profile-li" style="display:none">
      <button class="nav-username" id="nav-username"></button>
      <div class="nav-dropdown" id="nav-dropdown">
        <a href="warehouse.html">Warehouse</a>
        <button onclick="logout()">Sign out</button>
      </div>
    </li>
    <li id="nav-signin-li"><a href="auth.html">Sign in</a></li>
    <li id="nav-signup-li"><a href="auth.html" class="nav-signup">Sign up free</a></li>
  </ul>
</nav>
<div class="catalog-wrap">
  <div class="catalog-header">
    <h1 class="catalog-heading">Drink Aisle.</h1>
    <div class="country-filter" id="country-filter"></div>
  </div>
  <div class="catalog-grid" id="catalog"></div>
</div>
<script>
const user = getUser();

if (user) {
  document.getElementById('nav-username').textContent = '@' + user.username;
  document.getElementById('nav-log-li').style.display = '';
  document.getElementById('nav-profile-li').style.display = '';
  document.getElementById('nav-signin-li').style.display = 'none';
  document.getElementById('nav-signup-li').style.display = 'none';
}

{
  const KIND = 'drink';
  const vibeLabels = { eat: 'Would drink again', mid: 'Mid', never: 'Never again' };
  const noImgColors = ['#1a2a4a','#3a1a1a','#1a3a1a','#2a1a3a','#3a2a1a','#1a3a3a'];

  function buildCard(snack, delay) {
    const card = document.createElement('div');
    card.className = 'snack-card';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'snack-card-img';

    const bg = document.createElement('div');
    bg.className = 'snack-card-img-bg';
    bg.style.backgroundColor = noImgColors[(snack.name||'').charCodeAt(0) % noImgColors.length];
    imgWrap.appendChild(bg);

    if (snack.image) {
      const img = document.createElement('img');
      img.alt = snack.name;
      img.onload = () => { img.style.opacity = '1'; };
      img.onerror = () => img.remove();
      img.src = snack.image;
      imgWrap.appendChild(img);
    } else {
      const lbl = document.createElement('div');
      lbl.className = 'snack-card-no-label';
      lbl.innerHTML = `<p>${snaccEscapeHtml((snack.name||'').slice(0,14))}</p>`;
      imgWrap.appendChild(lbl);
    }

    const overlay = document.createElement('div');
    overlay.className = 'snack-card-overlay';
    const total = snack.total;
    ['eat','mid','never'].forEach(vibe => {
      const count = snack.counts[vibe];
      const pct = total > 0 ? Math.round((count / total) * 100) : 0;
      const row = document.createElement('div');
      row.className = 'overlay-bar-row';
      row.innerHTML = `
        <span class="overlay-bar-label">${vibeLabels[vibe]}</span>
        <span class="overlay-bar-count">${count}</span>
        <div class="overlay-bar-track"><div class="overlay-bar-fill"></div></div>`;
      overlay.appendChild(row);
      setTimeout(() => row.querySelector('.overlay-bar-fill').style.width = pct + '%', delay + 60);
    });
    imgWrap.appendChild(overlay);

    const info = document.createElement('div');
    info.className = 'snack-card-info';
    info.innerHTML = `
      <p class="snack-card-name">${snaccEscapeHtml(snack.name)}</p>
      <div class="snack-card-meta">
        <span class="snack-card-brand">${snaccEscapeHtml(snack.brand||'')}${snack.country ? ' / '+snaccEscapeHtml(countryFlag(snack.country)) : ''}</span>
        <span class="snack-card-count">${snack.total} ${snack.total === 1 ? 'log' : 'logs'}</span>
      </div>`;

    card.append(imgWrap, info);
    card.addEventListener('click', () => user ? openSnackModal({ name: snack.name, brand: snack.brand, image: snack.image, kind: KIND }) : window.location.href = 'auth.html');
    card.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    card.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    setTimeout(() => card.classList.add('in'), delay);
    return card;
  }

  let _activeCountryFilter = new URLSearchParams(window.location.search).get('country') || null;

  function aggregate(rows) {
    const map = {};
    rows.forEach(r => {
      if (!map[r.name]) {
        map[r.name] = { name: r.name, brand: r.brand, image: null, country: null, _cc: {}, counts: { eat: 0, mid: 0, never: 0 }, total: 0 };
      }
      if (!map[r.name].image && r.image) map[r.name].image = r.image;
      if (r.country) map[r.name]._cc[r.country] = (map[r.name]._cc[r.country]||0) + 1;
      if (r.vibe in map[r.name].counts) map[r.name].counts[r.vibe]++;
      map[r.name].total++;
    });
    Object.values(map).forEach(s => {
      const top = Object.keys(s._cc).sort((a,b) => s._cc[b]-s._cc[a])[0];
      s.country = top || null;
    });
    return Object.values(map).sort((a, b) => b.total - a.total);
  }

  function applyFilter() {
    document.querySelectorAll('.snack-card[data-country]').forEach(card => {
      const match = !_activeCountryFilter || card.dataset.country === _activeCountryFilter;
      card.style.display = match ? '' : 'none';
    });
    document.querySelectorAll('.country-filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.country === (_activeCountryFilter || ''));
    });
  }

  async function render() {
    const { data, error } = await sb
      .from('ratings')
      .select('name, brand, image, vibe, kind, country')
      .eq('kind', KIND);

    if (error || !data || !data.length) {
      document.getElementById('catalog').outerHTML = '<p class="catalog-empty">No drinks logged yet. Be the first.</p>';
      return;
    }

    const drinks = aggregate(data);
    const catalogEl = document.getElementById('catalog');
    drinks.forEach((s, i) => {
      const card = buildCard(s, i * 40);
      card.dataset.country = s.country || '';
      if (_activeCountryFilter && s.country !== _activeCountryFilter) card.style.display = 'none';
      catalogEl.appendChild(card);
    });

    const countries = {};
    drinks.forEach(s => { if (s.country) countries[s.country] = (countries[s.country]||0) + s.total; });
    const sorted = Object.keys(countries).sort((a,b) => countries[b]-countries[a]);
    const filterEl = document.getElementById('country-filter');
    if (!sorted.length) return;
    const allBtn = document.createElement('button');
    allBtn.className = 'country-filter-btn' + (!_activeCountryFilter ? ' active' : '');
    allBtn.textContent = 'All'; allBtn.dataset.country = '';
    allBtn.addEventListener('click', () => { _activeCountryFilter = null; applyFilter(); });
    filterEl.appendChild(allBtn);
    sorted.forEach(code => {
      const btn = document.createElement('button');
      btn.className = 'country-filter-btn' + (_activeCountryFilter === code ? ' active' : '');
      btn.textContent = `${countryFlag(code)} ${countryName(code)}`;
      btn.dataset.country = code;
      btn.addEventListener('click', () => { _activeCountryFilter = code; applyFilter(); });
      btn.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
      btn.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
      filterEl.appendChild(btn);
    });
  }

  render();

  if (user) {
    const navBtn = document.getElementById('nav-username');
    const navDrop = document.getElementById('nav-dropdown');
    navBtn.addEventListener('click', e => { e.stopPropagation(); navDrop.classList.toggle('open'); });
    document.addEventListener('click', () => navDrop.classList.remove('open'));
  }

  document.querySelectorAll('.nav-links a, .logo, .nav-username').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });
}
</script>
<script src="js/snack-modal.js"></script>
<script src="js/nav.js"></script>
<script src="js/cursor.js"></script>
</body>
</html>
