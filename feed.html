<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snacc. — Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<style>
.feed-wrap { max-width: 640px; margin: 0 auto; padding: 3rem 2.5rem 6rem; }
.feed-heading { font-family: 'Bitcount Prop Single', monospace; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 700; line-height: 1; letter-spacing: -.02em; margin-bottom: .5rem; }
.feed-sub { font-size: 0.65rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 3rem; }
.feed-item { display: flex; align-items: center; gap: 1.25rem; padding: 1.25rem 0; border-bottom: 1px solid var(--border); opacity: 0; transform: translateY(16px); transition: opacity .4s ease, transform .4s cubic-bezier(.16,1,.3,1); }
.feed-item.in { opacity: 1; transform: translateY(0); }
.feed-thumb { width: 56px; height: 56px; flex-shrink: 0; border-radius: 4px; overflow: hidden; background: #c8c5bd; display: flex; align-items: center; justify-content: center; }
.feed-thumb img { width: 100%; height: 100%; object-fit: contain; padding: 6px; filter: drop-shadow(0 2px 6px rgba(0,0,0,.2)); }
.feed-thumb-label { font-size: .55rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #fff; text-align: center; padding: 4px; line-height: 1.3; }
.feed-info { flex: 1; min-width: 0; }
.feed-name { font-size: .85rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .2rem; }
.feed-brand { font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: .4rem; }
.feed-meta { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
.feed-user { font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.feed-time { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.feed-time::before { content: '·'; margin-right: .6rem; }
.vibe-badge { display: inline-block; padding: .18rem .6rem; border-radius: 100px; font-size: 0.48rem; letter-spacing: .14em; text-transform: uppercase; font-weight: 600; }
.vibe-eat   { background: #1a7a3a; color: #fff; border: none; }
.vibe-mid   { background: #7a6a00; color: #fff; border: none; }
.vibe-never { background: #8a1a1a; color: #fff; border: none; }
.feed-empty { text-align: center; padding: 6rem 0; font-size: .7rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
@media (max-width: 700px) { .feed-wrap { padding: 2rem 1.25rem 5rem; } }
</style>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<nav>
  <a href="feed.html" class="logo">Snacc.</a>
  <ul class="nav-links">
    <li><a href="feed.html" class="active">Feed</a></li>
    <li><a href="log.html">Log a Snacc</a></li>
    <li class="nav-profile">
      <button class="nav-username" id="nav-username"></button>
      <div class="nav-dropdown" id="nav-dropdown">
        <a href="index.html">My Snaccs</a>
        <button onclick="logout()">Sign out</button>
      </div>
    </li>
  </ul>
</nav>
<div class="feed-wrap">
  <h1 class="feed-heading">What everyone's eating.</h1>
  <div id="feed"></div>
</div>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('nav-username').textContent = '@' + user.username;

  const vibeMap = {
    eat:   { label: 'Would Eat Again', cls: 'vibe-eat' },
    mid:   { label: 'Mid',             cls: 'vibe-mid' },
    never: { label: 'Never Again',     cls: 'vibe-never' },
  };

  const noImgColors = ['#1a2a4a','#3a1a1a','#1a3a1a','#2a1a3a','#3a2a1a','#1a3a3a'];

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
    return Math.floor(diff/604800) + 'w ago';
  }

  function buildItem(rating, delay) {
    const v = vibeMap[rating.vibe] || vibeMap.mid;
    const item = document.createElement('div');
    item.className = 'feed-item';

    const thumb = document.createElement('div');
    thumb.className = 'feed-thumb';
    const colorIdx = (rating.name||'').charCodeAt(0) % noImgColors.length;
    thumb.style.backgroundColor = noImgColors[colorIdx];

    if (rating.image) {
      const img = document.createElement('img');
      img.alt = rating.name;
      img.onload = () => { img.style.opacity = '1'; };
      img.onerror = () => { img.remove(); };
      img.style.opacity = '0';
      img.style.transition = 'opacity .3s ease';
      img.src = rating.image;
      thumb.appendChild(img);
    } else {
      const lbl = document.createElement('p');
      lbl.className = 'feed-thumb-label';
      lbl.textContent = (rating.name||'').slice(0,12);
      thumb.appendChild(lbl);
    }

    const username = rating.users?.username || null;

    const info = document.createElement('div');
    info.className = 'feed-info';
    info.innerHTML = `
      <p class="feed-name">${rating.name}</p>
      <p class="feed-brand">${rating.brand||''}</p>
      <div class="feed-meta">
        <span class="vibe-badge ${v.cls}">${v.label}</span>
        ${username ? `<span class="feed-user">@${username}</span>` : ''}
        <span class="feed-time">${timeAgo(rating.logged_at)}</span>
      </div>`;

    item.append(thumb, info);
    item.style.cursor = 'none';
    item.addEventListener('click', () => openSnackModal({ name: rating.name, brand: rating.brand, image: rating.image }));
    setTimeout(() => item.classList.add('in'), delay);
    return item;
  }

  async function render() {
    const feedEl = document.getElementById('feed');
    const { data, error } = await sb
      .from('ratings')
      .select('*, users(username)')
      .order('logged_at', { ascending: false })
      .limit(50);

    if (error || !data || !data.length) {
      feedEl.innerHTML = '<p class="feed-empty">Nothing logged yet. Be the first.</p>';
      return;
    }
    data.forEach((r, i) => feedEl.appendChild(buildItem(r, i * 50)));
  }

  render();

  const navBtn = document.getElementById('nav-username');
  const navDrop = document.getElementById('nav-dropdown');
  navBtn.addEventListener('click', e => { e.stopPropagation(); navDrop.classList.toggle('open'); });
  document.addEventListener('click', () => navDrop.classList.remove('open'));

  document.querySelectorAll('.nav-links a, .logo, .nav-username').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });
}
</script>
<script src="js/snack-modal.js"></script>
<script src="js/cursor.js"></script>
</body>
</html>
