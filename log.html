<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snacc. — Log a Snacc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<style>
.page { max-width: 860px; margin: 0 auto; padding: 4rem 2.5rem 6rem; }
.steps { display: flex; align-items: center; gap: .6rem; margin-bottom: 3rem; }
.step-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-hover); transition: background .3s, transform .3s; }
.step-dot.active { background: var(--ink); transform: scale(1.4); }
.step-dot.done { background: var(--ink); }
.section-label { font-size: 0.65rem; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-bottom: .7rem; }
.big-heading { font-family: 'Bitcount Prop Single', monospace; font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 700; line-height: .92; letter-spacing: -.02em; margin-bottom: 2.5rem; overflow: hidden; }
.big-heading span { display: block; transform: translateY(105%); animation: revealUp .7s cubic-bezier(.16,1,.3,1) .05s forwards; }
.search-wrap { position: relative; margin-bottom: .75rem; }
.search-input { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid var(--ink); padding: .9rem 3rem .9rem 0; font-size: 1.6rem; font-family: inherit; font-weight: 500; color: var(--ink); outline: none; cursor: none; caret-color: var(--ink); }
.search-input::placeholder { color: rgba(17,17,17,0.22); }
.search-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: var(--ink); border: none; width: 42px; height: 42px; border-radius: 50%; cursor: none; display: flex; align-items: center; justify-content: center; transition: transform .25s cubic-bezier(.34,1.56,.64,1); }
.search-btn:hover { transform: translateY(-50%) scale(1.12); }
.search-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }
.search-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
.searching-label { font-size: 0.62rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); opacity: 0; transition: opacity .2s; }
.searching-label.show { opacity: 1; }
.manual-trigger { font-size: 0.62rem; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); background: none; border: none; cursor: none; font-family: inherit; border-bottom: 1px solid var(--border); padding-bottom: 1px; transition: color .2s, border-color .2s; }
.manual-trigger:hover { color: var(--ink); border-color: var(--ink); }
.results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; margin-bottom: 3rem; opacity: 0; transform: translateY(20px); transition: opacity .45s ease, transform .45s cubic-bezier(.16,1,.3,1); }
.results.visible { opacity: 1; transform: translateY(0); }
.result-card { position: relative; aspect-ratio: 3/4; overflow: hidden; cursor: none; background: #c8c5bd; transform-style: preserve-3d; }
.result-card.selected::after { content: ''; position: absolute; inset: 0; border: 3px solid var(--ink); z-index: 10; pointer-events: none; }
.result-card-bg { position: absolute; inset: 0; transition: background-color .8s ease; }
.result-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 10%; opacity: 0; transition: opacity .5s ease, transform .5s cubic-bezier(.25,1,.5,1); filter: drop-shadow(0 10px 28px rgba(0,0,0,.45)); z-index: 2; }
.result-card:hover img { transform: scale(1.07) translateY(-3%); }
.result-card.no-img .result-card-label { opacity: 1; transform: translateY(0); background: linear-gradient(to top, rgba(0,0,0,.95) 0%, rgba(0,0,0,.5) 100%); }
.result-card-label { position: absolute; bottom: 0; left: 0; right: 0; padding: .9rem; z-index: 4; opacity: 0; transform: translateY(5px); background: linear-gradient(to top, rgba(0,0,0,.9) 0%, transparent 100%); transition: opacity .28s ease, transform .28s ease; }
.result-card:hover .result-card-label, .result-card.selected .result-card-label { opacity: 1; transform: translateY(0); }
.result-card-label p { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #fff; line-height: 1.3; }
.result-card-label span { font-size: .55rem; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.4); }
.result-card-label .src-badge { display: inline-block; font-size: .48rem; letter-spacing: .12em; text-transform: uppercase; padding: .1rem .4rem; border-radius: 100px; border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.4); margin-top: .35rem; }
.result-skel { position: absolute; inset: 0; z-index: 3; background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.14) 50%, rgba(255,255,255,.04) 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; transition: opacity .4s ease; }
.no-results { grid-column: 1 / -1; text-align: center; padding: 3rem 0; font-size: 0.75rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
.no-results button { display: block; margin: 1rem auto 0; font-size: 0.68rem; letter-spacing: .16em; text-transform: uppercase; color: var(--ink); background: none; border: none; cursor: none; font-family: inherit; border-bottom: 1px solid var(--ink); padding-bottom: 1px; }
.manual-form { display: none; margin-bottom: 3rem; padding: 2rem; border: 1px solid var(--border); animation: fadeIn .4s ease; }
.manual-form.show { display: block; }
.manual-form .form-label { font-size: 0.6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: .4rem; }
.manual-form .form-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: .6rem 0; font-size: 1rem; font-family: inherit; color: var(--ink); outline: none; margin-bottom: 1.5rem; caret-color: var(--ink); cursor: none; transition: border-color .2s; }
.manual-form .form-input:focus { border-color: var(--ink); }
.manual-form .form-input::placeholder { color: rgba(17,17,17,0.22); }
.manual-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
.manual-confirm-btn { background: var(--ink); color: var(--bg); border: none; padding: .9rem 2rem; font-family: inherit; font-size: 0.68rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; cursor: none; transition: transform .25s cubic-bezier(.34,1.56,.64,1); margin-top: .5rem; }
.manual-confirm-btn:hover { transform: scale(1.04); }
.rating-section { opacity: 0; transform: translateY(24px); transition: opacity .45s ease .1s, transform .45s cubic-bezier(.16,1,.3,1) .1s; pointer-events: none; }
.rating-section.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
.rating-divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 2.5rem; }
.selected-preview { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 2.5rem; }
.preview-img-wrap { width: 72px; height: 72px; flex-shrink: 0; background: #c8c5bd; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.preview-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 8px; filter: drop-shadow(0 4px 10px rgba(0,0,0,.3)); }
.preview-info .preview-brand { font-size: 0.58rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: .2rem; }
.preview-info .preview-name { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
.vibe-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; margin-bottom: 3rem; }
.vibe-option { padding: 2rem 1.5rem; background: transparent; border: none; cursor: none; font-family: inherit; text-align: left; position: relative; overflow: hidden; }
.vibe-option::before { content: ''; position: absolute; inset: 0; background: var(--ink); transform: scaleY(0); transform-origin: bottom; transition: transform .4s cubic-bezier(.16,1,.3,1); z-index: 0; }
.vibe-option:hover::before, .vibe-option.picked::before { transform: scaleY(1); }
.vibe-option .label { display: block; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--ink); position: relative; z-index: 1; transition: color .3s ease; }
.vibe-option .sublabel { display: block; font-size: 0.62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-top: .3rem; position: relative; z-index: 1; transition: color .3s ease; }
.vibe-option:hover .label, .vibe-option.picked .label { color: #fff; }
.vibe-option:hover .sublabel, .vibe-option.picked .sublabel { color: rgba(255,255,255,.45); }
.save-btn { display: flex; align-items: center; gap: .75rem; background: var(--ink); color: var(--bg); border: none; padding: 1.1rem 2.5rem; font-family: inherit; font-size: 0.72rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; cursor: none; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s; opacity: 0; pointer-events: none; }
.save-btn.ready { opacity: 1; pointer-events: all; }
.save-btn:hover { transform: scale(1.04); }
.save-btn svg { width: 14px; height: 14px; stroke: var(--bg); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.save-btn.saving { opacity: .5; pointer-events: none; }
.success-msg { display: none; align-items: center; gap: 1rem; padding: 1.5rem 0; }
.success-msg.show { display: flex; }
.success-msg p { font-size: 0.72rem; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; }
.success-msg a { font-size: 0.68rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); text-decoration: none; cursor: none; border-bottom: 1px solid var(--border); padding-bottom: 1px; transition: color .2s, border-color .2s; }
.success-msg a:hover { color: var(--ink); border-color: var(--ink); }
@media (max-width: 700px) {
  .page { padding: 2.5rem 1.25rem 5rem; }
  .results { grid-template-columns: repeat(2, 1fr); }
  .vibe-options { grid-template-columns: 1fr; }
  .search-input { font-size: 1.2rem; }
  .manual-form .form-row { grid-template-columns: 1fr; gap: 0; }
}
</style>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<nav>
  <a href="feed.html" class="logo">Snacc.</a>
  <ul class="nav-links">
    <li><a href="feed.html">Snaccs</a></li>
    <li><a href="#" class="active">Log a Snacc</a></li>
    <li class="nav-profile">
      <button class="nav-username" id="nav-username"></button>
      <div class="nav-dropdown" id="nav-dropdown">
        <a href="index.html">My Snaccs</a>
        <button onclick="logout()">Sign out</button>
      </div>
    </li>
  </ul>
</nav>
<div class="page">
  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>
  <p class="section-label">Step 01 — Find your snacc</p>
  <h1 class="big-heading"><span>What did<br>you eat?</span></h1>
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Cheetos Flamin Hot Puffs…" autocomplete="off"/>
    <button class="search-btn" id="search-btn">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    </button>
  </div>
  <div class="search-meta">
    <span class="searching-label" id="searching-label">Searching…</span>
    <button class="manual-trigger" id="manual-trigger">Can't find it? Add manually</button>
  </div>
  <div class="manual-form" id="manual-form">
    <p class="section-label" style="margin-bottom:1.5rem;">Enter the details</p>
    <div class="form-row">
      <div>
        <label class="form-label">Snack name</label>
        <input class="form-input" id="manual-name" type="text" placeholder="Cheetos Flamin' Hot Puffs"/>
      </div>
      <div>
        <label class="form-label">Brand</label>
        <input class="form-input" id="manual-brand" type="text" placeholder="Cheetos"/>
      </div>
    </div>
    <label class="form-label" style="margin-bottom:.6rem;">Photo <span style="opacity:.4">(optional)</span></label>
    <div class="photo-area" id="photo-area">
      <input type="file" id="photo-input" accept="image/*" style="display:none"/>
      <div class="photo-placeholder" id="photo-placeholder">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>Tap to add photo</span>
      </div>
      <img id="photo-preview" alt=""/>
      <button class="photo-retry" id="photo-retry">Change photo</button>
    </div>
    <label class="form-label" style="margin-top:1.5rem;margin-bottom:.6rem;">Nutrition <span style="opacity:.4">(optional)</span></label>
    <div class="nut-scan-row">
      <button class="nut-scan-btn" id="nut-scan-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Scan nutrition label
      </button>
      <input type="file" id="nut-input" accept="image/*" style="display:none"/>
      <span class="nut-status" id="nut-status"></span>
    </div>
    <div class="nut-grid">
      <div><label class="form-label">Serving size</label><input class="form-input" id="nut-serving" placeholder="28g"/></div>
      <div><label class="form-label">Calories</label><input class="form-input" id="nut-cal" type="number" placeholder="150"/></div>
      <div><label class="form-label">Total fat (g)</label><input class="form-input" id="nut-fat" type="number" placeholder="8"/></div>
      <div><label class="form-label">Saturated fat (g)</label><input class="form-input" id="nut-satfat" type="number" placeholder="1.5"/></div>
      <div><label class="form-label">Sodium (mg)</label><input class="form-input" id="nut-sodium" type="number" placeholder="190"/></div>
      <div><label class="form-label">Total carbs (g)</label><input class="form-input" id="nut-carbs" type="number" placeholder="18"/></div>
      <div><label class="form-label">Dietary fiber (g)</label><input class="form-input" id="nut-fiber" type="number" placeholder="1"/></div>
      <div><label class="form-label">Total sugars (g)</label><input class="form-input" id="nut-sugars" type="number" placeholder="2"/></div>
      <div><label class="form-label">Protein (g)</label><input class="form-input" id="nut-protein" type="number" placeholder="2"/></div>
    </div>
    <button class="manual-confirm-btn" id="manual-confirm">Use this →</button>
  </div>
  <div class="results" id="results"></div>
  <div class="rating-section" id="rating-section">
    <div class="rating-divider"></div>
    <p class="section-label" style="margin-bottom:1.25rem;">Step 02 — How was it?</p>
    <div class="selected-preview">
      <div class="preview-img-wrap" id="preview-img-wrap">
        <img id="preview-img" alt=""/>
      </div>
      <div class="preview-info">
        <p class="preview-brand" id="preview-brand"></p>
        <p class="preview-name" id="preview-name"></p>
      </div>
    </div>
    <div class="vibe-options" id="vibe-options">
      <button class="vibe-option" data-vibe="eat">
        <span class="label">Would Eat Again</span>
        <span class="sublabel">Absolutely sending it</span>
      </button>
      <button class="vibe-option" data-vibe="mid">
        <span class="label">Mid</span>
        <span class="sublabel">Wouldn't go out of my way</span>
      </button>
      <button class="vibe-option" data-vibe="never">
        <span class="label">Never Again</span>
        <span class="sublabel">It offended me personally</span>
      </button>
    </div>
    <button class="save-btn" id="save-btn">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Log this Snacc
    </button>
    <div class="success-msg" id="success-msg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <div>
        <p>Logged.</p>
        <a href="index.html">View my Snaccs →</a>
      </div>
    </div>
  </div>
</div>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('nav-username').textContent = '@' + user.username;

  function setStep(n) {
    ['dot1','dot2','dot3'].forEach((id,i) => {
      const d=document.getElementById(id);
      d.classList.toggle('done',i<n-1);
      d.classList.toggle('active',i===n-1);
    });
  }

  let selectedProduct=null, selectedVibe=null;

  function _fetchWithTimeout(url, ms=8000) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(t));
  }

  function _parseOFFProducts(products) {
    return (products||[]).filter(p=>p.product_name).map(p=>({
      id: p.code||p.id, name: p.product_name,
      brand: (p.brands||'').split(',')[0].trim(),
      image: p.image_front_url||null, source:'Open Food Facts'
    }));
  }

  async function searchOFF(q) {
    const enc = encodeURIComponent(q);
    const fields = 'code,id,product_name,brands,image_front_url';
    const tryFetch = url => _fetchWithTimeout(url)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(d => _parseOFFProducts(d.products));

    const [cgi, v2] = await Promise.all([
      tryFetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${enc}&search_simple=1&action=process&json=1&page_size=9&sort_by=popularity_key&lc=en&fields=${fields}`).catch(()=>null),
      tryFetch(`https://world.openfoodfacts.org/api/v2/search?q=${enc}&page_size=9&sort_by=popularity_key&fields=${fields}`).catch(()=>null)
    ]);

    // null = service error, [] = no results
    if (cgi === null && v2 === null) return null; // signal: service down
    const merged = [...(v2||[]), ...(cgi||[])];
    const seen = new Set(), out = [];
    for (const p of merged) {
      const key = (p.name||'').toLowerCase().slice(0,30);
      if (!seen.has(key)) { seen.add(key); out.push(p); }
      if (out.length >= 6) break;
    }
    return out;
  }

  async function searchUSDA(q) {
    try {
      const url=`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&dataType=Branded&pageSize=6&api_key=DEMO_KEY`;
      const res = await _fetchWithTimeout(url);
      if (!res.ok) return null; // signal: service down
      const data = await res.json();
      return (data.foods||[]).filter(f=>f.description).map(f=>({
        id:`usda-${f.fdcId}`, name:f.description, brand:f.brandOwner||f.brandName||'', image:null, source:'USDA'
      }));
    } catch { return null; }
  }

  function buildResultCard(product) {
    const card=document.createElement('div');
    card.className='result-card'+(!product.image?' no-img':'');
    const bg=document.createElement('div'); bg.className='result-card-bg';
    const skel=document.createElement('div'); skel.className='result-skel';
    const label=document.createElement('div'); label.className='result-card-label';
    label.innerHTML=`<span>${product.brand}</span><p>${product.name}</p><span class="src-badge">${product.source}</span>`;
    card.append(bg,skel,label);
    if (product.image) {
      const img=document.createElement('img');
      img.alt=product.name;
      card.insertBefore(img,skel);
      img.onload=()=>{ img.style.opacity='1'; skel.style.opacity='0'; setTimeout(()=>skel.remove(),500); };
      img.onerror=()=>skel.remove();
      img.src=product.image;
    } else {
      const colors=['#1a2a4a','#3a1a1a','#1a3a1a','#2a1a3a','#3a2a1a','#1a3a3a'];
      bg.style.backgroundColor=colors[product.name.charCodeAt(0)%colors.length];
      skel.remove();
    }
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      card.style.transition='transform .08s ease';
      card.style.transform=`perspective(700px) rotateX(${((e.clientY-r.top)/r.height-.5)*12}deg) rotateY(${-((e.clientX-r.left)/r.width-.5)*12}deg) scale(1.02)`;
    });
    card.addEventListener('mouseleave',()=>{ card.style.transition='transform .5s cubic-bezier(.16,1,.3,1)'; card.style.transform='perspective(700px) rotateX(0) rotateY(0) scale(1)'; });
    card.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
    card.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
    card.addEventListener('click',()=>{
      document.querySelectorAll('.result-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      selectProduct(product, card.querySelector('img')?.src||null);
    });
    return card;
  }

  function selectProduct(product, imgSrc) {
    selectedProduct=product; selectedVibe=null;
    document.querySelectorAll('.vibe-option').forEach(b=>b.classList.remove('picked'));
    document.getElementById('save-btn').classList.remove('ready');
    document.getElementById('success-msg').classList.remove('show');
    document.getElementById('preview-brand').textContent=product.brand;
    document.getElementById('preview-name').textContent=product.name;
    const pImg=document.getElementById('preview-img');
    pImg.src=imgSrc||product.image||'';
    pImg.style.display=(imgSrc||product.image)?'block':'none';
    document.getElementById('rating-section').classList.add('visible');
    setStep(2);
    setTimeout(()=>document.getElementById('rating-section').scrollIntoView({behavior:'smooth',block:'start'}),120);
  }

  async function doSearch() {
    const q=document.getElementById('search-input').value.trim();
    if (!q) return;
    selectedProduct=null; selectedVibe=null;
    document.getElementById('rating-section').classList.remove('visible');
    document.getElementById('save-btn').classList.remove('ready');
    document.getElementById('success-msg').classList.remove('show');
    document.getElementById('manual-form').classList.remove('show');
    const resultsEl=document.getElementById('results');
    resultsEl.innerHTML=''; resultsEl.classList.remove('visible');
    document.getElementById('searching-label').classList.add('show');
    setStep(1);
    const [off,usda]=await Promise.all([searchOFF(q),searchUSDA(q)]);
    document.getElementById('searching-label').classList.remove('show');

    const allDown = off===null && usda===null;
    const combined = [...(off||[]),...(usda||[])];
    const seen=new Set(), merged=[];
    for (const p of combined) {
      const key=p.name.toLowerCase().slice(0,30);
      if (!seen.has(key)){seen.add(key);merged.push(p);}
      if (merged.length>=6) break;
    }
    if (!merged.length) {
      const msg = allDown
        ? 'Search is temporarily unavailable.'
        : 'Nothing found — try a shorter name.';
      resultsEl.innerHTML=`<div class="no-results">${msg}<button id="no-res-manual">Add it manually →</button></div>`;
      resultsEl.classList.add('visible');
      document.getElementById('no-res-manual').addEventListener('click',showManual);
      return;
    }
    merged.forEach(p=>resultsEl.appendChild(buildResultCard(p)));
    resultsEl.classList.add('visible');
  }

  document.getElementById('search-btn').addEventListener('click',doSearch);
  document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

  function showManual() { document.getElementById('manual-form').classList.add('show'); document.getElementById('manual-name').focus(); }
  document.getElementById('manual-trigger').addEventListener('click',showManual);

  // Photo upload
  const photoArea = document.getElementById('photo-area');
  const photoInput = document.getElementById('photo-input');
  const photoPreview = document.getElementById('photo-preview');
  const photoPlaceholder = document.getElementById('photo-placeholder');
  const photoRetry = document.getElementById('photo-retry');
  let _manualImageFile = null;

  photoArea.addEventListener('click', e => { if (e.target !== photoRetry) photoInput.click(); });
  photoRetry.addEventListener('click', e => { e.stopPropagation(); photoInput.click(); });
  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) return;
    _manualImageFile = file;
    const url = URL.createObjectURL(file);
    photoPreview.src = url;
    photoPreview.style.display = 'block';
    photoPlaceholder.style.display = 'none';
    photoRetry.style.display = 'block';
  });

  // Nutrition scan
  const nutInput = document.getElementById('nut-input');
  document.getElementById('nut-scan-btn').addEventListener('click', () => nutInput.click());
  function _preprocessForOCR(file) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const scale = Math.min(4, 1600 / Math.max(img.width, img.height, 1));
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = id.data;
        for (let i = 0; i < d.length; i += 4) {
          let g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
          g = Math.min(255, Math.max(0, (g - 128) * 1.8 + 128)); // contrast boost
          d[i] = d[i+1] = d[i+2] = g;
        }
        ctx.putImageData(id, 0, 0);
        URL.revokeObjectURL(url);
        canvas.toBlob(resolve, 'image/png');
      };
      img.src = url;
    });
  }

  nutInput.addEventListener('change', async () => {
    const file = nutInput.files[0];
    if (!file) return;
    const status = document.getElementById('nut-status');
    status.textContent = 'Scanning…';
    try {
      if (!window.Tesseract) {
        await new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
      }
      const processed = await _preprocessForOCR(file);
      const worker = await Tesseract.createWorker('eng');
      await worker.setParameters({ tessedit_pageseg_mode: '6' });
      const { data: { text } } = await worker.recognize(processed);
      await worker.terminate();
      const parsed = _parseNutrition(text);
      if (parsed.serving) document.getElementById('nut-serving').value = parsed.serving;
      if (parsed.calories) document.getElementById('nut-cal').value = parsed.calories;
      if (parsed.fat) document.getElementById('nut-fat').value = parsed.fat;
      if (parsed.satFat) document.getElementById('nut-satfat').value = parsed.satFat;
      if (parsed.sodium) document.getElementById('nut-sodium').value = parsed.sodium;
      if (parsed.carbs) document.getElementById('nut-carbs').value = parsed.carbs;
      if (parsed.fiber) document.getElementById('nut-fiber').value = parsed.fiber;
      if (parsed.sugars) document.getElementById('nut-sugars').value = parsed.sugars;
      if (parsed.protein) document.getElementById('nut-protein').value = parsed.protein;
      status.textContent = 'Done — check the values below.';
    } catch(e) { status.textContent = 'Scan failed — fill in manually.'; }
  });

  function _parseNutrition(text) {
    // Normalize common OCR misreads
    const t = text
      .replace(/[Oo](?=\d)/g, '0').replace(/(?<=\d)[Oo]/g, '0')
      .replace(/[Il](?=\d)/g, '1').replace(/(?<=\d)[Il]/g, '1')
      .replace(/rng/g, 'mg').replace(/\s+/g, ' ');
    const find = (re) => { const m = t.match(re); return m ? m[1].trim() : ''; };
    const num  = (re) => { const m = t.match(re); return m ? m[1].replace(/[^0-9.]/g,'') : ''; };
    return {
      serving:  find(/serving\s*size[^0-9]*([0-9][^\n]{0,25})/i),
      calories: num(/calori[^0-9]*([0-9][0-9.]*)/i),
      fat:      num(/total\s*fat[^0-9]*([0-9][0-9.]*)/i),
      satFat:   num(/saturated\s*fat[^0-9]*([0-9][0-9.]*)/i),
      sodium:   num(/sodium[^0-9]*([0-9]+)/i),
      carbs:    num(/total\s*carb[a-z]*[^0-9]*([0-9][0-9.]*)/i),
      fiber:    num(/dietary\s*fiber[^0-9]*([0-9][0-9.]*)/i),
      sugars:   num(/total\s*sugars?[^0-9]*([0-9][0-9.]*)/i),
      protein:  num(/protein[^0-9]*([0-9][0-9.]*)/i),
    };
  }

  function _getNutritionFields() {
    const n = {
      serving: document.getElementById('nut-serving').value.trim()||null,
      calories: parseFloat(document.getElementById('nut-cal').value)||null,
      fat: parseFloat(document.getElementById('nut-fat').value)||null,
      satFat: parseFloat(document.getElementById('nut-satfat').value)||null,
      sodium: parseFloat(document.getElementById('nut-sodium').value)||null,
      carbs: parseFloat(document.getElementById('nut-carbs').value)||null,
      fiber: parseFloat(document.getElementById('nut-fiber').value)||null,
      sugars: parseFloat(document.getElementById('nut-sugars').value)||null,
      protein: parseFloat(document.getElementById('nut-protein').value)||null,
    };
    return Object.values(n).some(v=>v!==null) ? n : null;
  }

  async function _uploadImage(file) {
    const ext = file.name.split('.').pop()||'jpg';
    const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const { error } = await sb.storage.from('snack-images').upload(path, file, { cacheControl:'3600', upsert:false });
    if (error) throw error;
    return sb.storage.from('snack-images').getPublicUrl(path).data.publicUrl;
  }

  document.getElementById('manual-confirm').addEventListener('click', async () => {
    const name = document.getElementById('manual-name').value.trim();
    const brand = document.getElementById('manual-brand').value.trim();
    if (!name) { document.getElementById('manual-name').focus(); return; }
    const btn = document.getElementById('manual-confirm');
    btn.textContent = 'Uploading…'; btn.disabled = true;
    let imgUrl = null;
    try { if (_manualImageFile) imgUrl = await _uploadImage(_manualImageFile); } catch {}
    btn.textContent = 'Use this →'; btn.disabled = false;
    const nutrition = _getNutritionFields();
    const product = { id:`manual-${Date.now()}`, name, brand, image:imgUrl, source:'Manual', nutrition };
    document.getElementById('manual-form').classList.remove('show');
    document.getElementById('results').classList.remove('visible');
    selectProduct(product, imgUrl);
  });

  document.querySelectorAll('.vibe-option').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.vibe-option').forEach(b=>b.classList.remove('picked'));
      btn.classList.add('picked');
      selectedVibe=btn.dataset.vibe;
      document.getElementById('save-btn').classList.add('ready');
      setStep(3);
    });
    btn.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
    btn.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
  });

  document.getElementById('save-btn').addEventListener('click',async()=>{
    if (!selectedProduct||!selectedVibe) return;
    const btn=document.getElementById('save-btn');
    btn.classList.add('saving');
    const {error}=await sb.from('ratings').insert({
      name:selectedProduct.name, brand:selectedProduct.brand||'',
      vibe:selectedVibe, image:selectedProduct.image||null,
      source:selectedProduct.source||'', logged_at:new Date().toISOString(),
      user_id:user.id,
      barcode: selectedProduct.source==='Open Food Facts' ? selectedProduct.id : null,
      nutrition: selectedProduct.nutrition||null
    });
    btn.classList.remove('saving');
    if (error) {
      alert('Failed to save: ' + error.message);
    } else {
      btn.classList.remove('ready');
      document.getElementById('success-msg').classList.add('show');
      document.querySelectorAll('.vibe-option').forEach(b=>b.classList.remove('picked'));
      selectedProduct=null; selectedVibe=null; setStep(1);
    }
  });

  const navBtn = document.getElementById('nav-username');
  const navDrop = document.getElementById('nav-dropdown');
  navBtn.addEventListener('click', e => { e.stopPropagation(); navDrop.classList.toggle('open'); });
  document.addEventListener('click', () => navDrop.classList.remove('open'));

  document.querySelectorAll('.nav-links a, .logo, .search-btn, .save-btn, .manual-trigger, .manual-confirm-btn, .nav-username').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
  });
}
</script>
<script src="js/cursor.js"></script>
</body>
</html>
