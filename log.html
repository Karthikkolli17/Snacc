<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snacc. — Log a Snacc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #EEEBE3;
  --ink: #111111;
  --muted: rgba(17,17,17,0.38);
  --border: rgba(17,17,17,0.12);
  --border-hover: rgba(17,17,17,0.3);
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  cursor: none;
  overflow-x: hidden;
  min-height: 100vh;
}

#cur-dot {
  width: 7px; height: 7px; background: var(--ink);
  border-radius: 50%; position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .2s, height .2s;
}
#cur-ring {
  width: 38px; height: 38px; border: 1.5px solid var(--ink);
  border-radius: 50%; position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%,-50%);
  transition: width .3s, height .3s, opacity .3s;
}
body.hovering #cur-dot { width: 12px; height: 12px; }
body.hovering #cur-ring { width: 54px; height: 54px; opacity: .35; }

nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.6rem 2.5rem; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg); z-index: 100;
}
.logo {
  font-family: 'Bitcount Prop Single', monospace;
  font-size: 2rem; font-weight: 700; color: var(--ink);
  text-decoration: none; cursor: none;
}
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a {
  font-size: 0.68rem; font-weight: 500; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--ink);
  text-decoration: none; cursor: none; position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -2px; left: 0;
  width: 0; height: 1px; background: var(--ink);
  transition: width .35s cubic-bezier(.25,1,.5,1);
}
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

.page { max-width: 860px; margin: 0 auto; padding: 4rem 2.5rem 6rem; }

.steps { display: flex; align-items: center; gap: .6rem; margin-bottom: 3rem; }
.step-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border-hover); transition: background .3s, transform .3s;
}
.step-dot.active { background: var(--ink); transform: scale(1.4); }
.step-dot.done   { background: var(--ink); }

.section-label {
  font-size: 0.65rem; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted); margin-bottom: .7rem;
}

.big-heading {
  font-family: 'Bitcount Prop Single', monospace;
  font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 700;
  line-height: .92; letter-spacing: -.02em; margin-bottom: 2.5rem; overflow: hidden;
}
.big-heading span {
  display: block; transform: translateY(105%);
  animation: revealUp .7s cubic-bezier(.16,1,.3,1) .05s forwards;
}
@keyframes revealUp { to { transform: translateY(0); } }

.search-wrap { position: relative; margin-bottom: .75rem; }
.search-input {
  width: 100%; background: transparent; border: none;
  border-bottom: 1.5px solid var(--ink);
  padding: .9rem 3rem .9rem 0;
  font-size: 1.6rem; font-family: inherit; font-weight: 500;
  color: var(--ink); outline: none; cursor: none; caret-color: var(--ink);
}
.search-input::placeholder { color: rgba(17,17,17,0.22); }
.search-btn {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  background: var(--ink); border: none; width: 42px; height: 42px;
  border-radius: 50%; cursor: none;
  display: flex; align-items: center; justify-content: center;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}
.search-btn:hover { transform: translateY(-50%) scale(1.12); }
.search-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }

.search-meta {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;
}
.searching-label {
  font-size: 0.62rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); opacity: 0; transition: opacity .2s;
}
.searching-label.show { opacity: 1; }
.manual-trigger {
  font-size: 0.62rem; letter-spacing: .16em; text-transform: uppercase;
  color: var(--muted); background: none; border: none; cursor: none;
  font-family: inherit; border-bottom: 1px solid var(--border);
  padding-bottom: 1px; transition: color .2s, border-color .2s;
}
.manual-trigger:hover { color: var(--ink); border-color: var(--ink); }

.results {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1.5px; margin-bottom: 3rem;
  opacity: 0; transform: translateY(20px);
  transition: opacity .45s ease, transform .45s cubic-bezier(.16,1,.3,1);
}
.results.visible { opacity: 1; transform: translateY(0); }

.result-card {
  position: relative; aspect-ratio: 3/4; overflow: hidden;
  cursor: none; background: #c8c5bd; transform-style: preserve-3d;
}
.result-card.selected::after {
  content: ''; position: absolute; inset: 0;
  border: 3px solid var(--ink); z-index: 10; pointer-events: none;
}
.result-card-bg { position: absolute; inset: 0; transition: background-color .8s ease; }

.result-card img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: contain; padding: 10%; opacity: 0;
  transition: opacity .5s ease, transform .5s cubic-bezier(.25,1,.5,1);
  filter: drop-shadow(0 10px 28px rgba(0,0,0,.45)); z-index: 2;
}
.result-card:hover img { transform: scale(1.07) translateY(-3%); }

.result-card.no-img .result-card-label { opacity: 1; transform: translateY(0); background: linear-gradient(to top, rgba(0,0,0,.95) 0%, rgba(0,0,0,.5) 100%); }

.result-card-label {
  position: absolute; bottom: 0; left: 0; right: 0; padding: .9rem; z-index: 4;
  opacity: 0; transform: translateY(5px);
  background: linear-gradient(to top, rgba(0,0,0,.9) 0%, transparent 100%);
  transition: opacity .28s ease, transform .28s ease;
}
.result-card:hover .result-card-label,
.result-card.selected .result-card-label { opacity: 1; transform: translateY(0); }
.result-card-label p { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #fff; line-height: 1.3; }
.result-card-label span { font-size: .55rem; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.4); }
.result-card-label .src-badge {
  display: inline-block; font-size: .48rem; letter-spacing: .12em;
  text-transform: uppercase; padding: .1rem .4rem; border-radius: 100px;
  border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.4); margin-top: .35rem;
}

.result-skel {
  position: absolute; inset: 0; z-index: 3;
  background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.14) 50%, rgba(255,255,255,.04) 100%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; transition: opacity .4s ease;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.no-results {
  grid-column: 1 / -1; text-align: center; padding: 3rem 0;
  font-size: 0.75rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted);
}
.no-results button {
  display: block; margin: 1rem auto 0;
  font-size: 0.68rem; letter-spacing: .16em; text-transform: uppercase;
  color: var(--ink); background: none; border: none; cursor: none;
  font-family: inherit; border-bottom: 1px solid var(--ink); padding-bottom: 1px;
}

.manual-form {
  display: none; margin-bottom: 3rem; padding: 2rem; border: 1px solid var(--border);
  animation: fadeIn .4s ease;
}
.manual-form.show { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.manual-form .form-label {
  font-size: 0.6rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); display: block; margin-bottom: .4rem;
}
.manual-form .form-input {
  width: 100%; background: transparent; border: none;
  border-bottom: 1px solid var(--border); padding: .6rem 0;
  font-size: 1rem; font-family: inherit; color: var(--ink);
  outline: none; margin-bottom: 1.5rem; caret-color: var(--ink); cursor: none;
  transition: border-color .2s;
}
.manual-form .form-input:focus { border-color: var(--ink); }
.manual-form .form-input::placeholder { color: rgba(17,17,17,0.22); }
.manual-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
.manual-confirm-btn {
  background: var(--ink); color: var(--bg); border: none;
  padding: .9rem 2rem; font-family: inherit; font-size: 0.68rem;
  font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
  cursor: none; transition: transform .25s cubic-bezier(.34,1.56,.64,1); margin-top: .5rem;
}
.manual-confirm-btn:hover { transform: scale(1.04); }

.rating-section {
  opacity: 0; transform: translateY(24px);
  transition: opacity .45s ease .1s, transform .45s cubic-bezier(.16,1,.3,1) .1s;
  pointer-events: none;
}
.rating-section.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
.rating-divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 2.5rem; }

.selected-preview { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 2.5rem; }
.preview-img-wrap {
  width: 72px; height: 72px; flex-shrink: 0;
  background: #c8c5bd; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.preview-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 8px; filter: drop-shadow(0 4px 10px rgba(0,0,0,.3)); }
.preview-info .preview-brand { font-size: 0.58rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: .2rem; }
.preview-info .preview-name { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }

.vibe-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; margin-bottom: 3rem; }
.vibe-option {
  padding: 2rem 1.5rem; background: transparent; border: none;
  cursor: none; font-family: inherit; text-align: left;
  position: relative; overflow: hidden;
}
.vibe-option::before {
  content: ''; position: absolute; inset: 0; background: var(--ink);
  transform: scaleY(0); transform-origin: bottom;
  transition: transform .4s cubic-bezier(.16,1,.3,1); z-index: 0;
}
.vibe-option:hover::before, .vibe-option.picked::before { transform: scaleY(1); }
.vibe-option .label {
  display: block; font-size: 1.1rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .04em; color: var(--ink);
  position: relative; z-index: 1; transition: color .3s ease;
}
.vibe-option .sublabel {
  display: block; font-size: 0.62rem; letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted); margin-top: .3rem;
  position: relative; z-index: 1; transition: color .3s ease;
}
.vibe-option:hover .label, .vibe-option.picked .label { color: #fff; }
.vibe-option:hover .sublabel, .vibe-option.picked .sublabel { color: rgba(255,255,255,.45); }

.save-btn {
  display: flex; align-items: center; gap: .75rem;
  background: var(--ink); color: var(--bg); border: none;
  padding: 1.1rem 2.5rem; font-family: inherit;
  font-size: 0.72rem; font-weight: 600; letter-spacing: .18em;
  text-transform: uppercase; cursor: none;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  opacity: 0; pointer-events: none;
}
.save-btn.ready { opacity: 1; pointer-events: all; }
.save-btn:hover { transform: scale(1.04); }
.save-btn svg { width: 14px; height: 14px; stroke: var(--bg); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

.save-btn.saving { opacity: .5; pointer-events: none; }

.success-msg { display: none; align-items: center; gap: 1rem; padding: 1.5rem 0; }
.success-msg.show { display: flex; }
.success-msg p { font-size: 0.72rem; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; }
.success-msg a {
  font-size: 0.68rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); text-decoration: none; cursor: none;
  border-bottom: 1px solid var(--border); padding-bottom: 1px;
  transition: color .2s, border-color .2s;
}
.success-msg a:hover { color: var(--ink); border-color: var(--ink); }

@media (max-width: 700px) {
  body { cursor: auto; }
  #cur-dot, #cur-ring { display: none; }
  nav { padding: 1.25rem; }
  .nav-links { gap: 1.5rem; }
  .page { padding: 2.5rem 1.25rem 5rem; }
  .results { grid-template-columns: repeat(2, 1fr); }
  .vibe-options { grid-template-columns: 1fr; }
  .search-input { font-size: 1.2rem; }
  .manual-form .form-row { grid-template-columns: 1fr; gap: 0; }
}
</style>
</head>
<body>

<div id="cur-dot"></div>
<div id="cur-ring"></div>

<nav>
  <a href="index.html" class="logo">Snacc.</a>
  <ul class="nav-links">
    <li><a href="index.html">My Snaccs</a></li>
    <li><a href="#" class="active">Log a Snacc</a></li>
  </ul>
</nav>

<div class="page">
  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <p class="section-label">Step 01 — Find your snacc</p>
  <h1 class="big-heading"><span>What did<br>you eat?</span></h1>

  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Cheetos Flamin Hot Puffs…" autocomplete="off"/>
    <button class="search-btn" id="search-btn">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    </button>
  </div>

  <div class="search-meta">
    <span class="searching-label" id="searching-label">Searching…</span>
    <button class="manual-trigger" id="manual-trigger">Can't find it? Add manually</button>
  </div>

  <div class="manual-form" id="manual-form">
    <p class="section-label" style="margin-bottom:1.5rem;">Enter the details</p>
    <div class="form-row">
      <div>
        <label class="form-label">Snack name</label>
        <input class="form-input" id="manual-name" type="text" placeholder="Cheetos Flamin' Hot Puffs"/>
      </div>
      <div>
        <label class="form-label">Brand</label>
        <input class="form-input" id="manual-brand" type="text" placeholder="Cheetos"/>
      </div>
    </div>
    <label class="form-label">Image URL (optional)</label>
    <input class="form-input" id="manual-img" type="text" placeholder="https://…"/>
    <button class="manual-confirm-btn" id="manual-confirm">Use this →</button>
  </div>

  <div class="results" id="results"></div>

  <div class="rating-section" id="rating-section">
    <div class="rating-divider"></div>
    <p class="section-label" style="margin-bottom:1.25rem;">Step 02 — How was it?</p>

    <div class="selected-preview">
      <div class="preview-img-wrap" id="preview-img-wrap">
        <img id="preview-img" src="" alt=""/>
      </div>
      <div class="preview-info">
        <p class="preview-brand" id="preview-brand"></p>
        <p class="preview-name"  id="preview-name"></p>
      </div>
    </div>

    <div class="vibe-options" id="vibe-options">
      <button class="vibe-option" data-vibe="eat">
        <span class="label">Would Eat Again</span>
        <span class="sublabel">Absolutely sending it</span>
      </button>
      <button class="vibe-option" data-vibe="mid">
        <span class="label">Mid</span>
        <span class="sublabel">Wouldn't go out of my way</span>
      </button>
      <button class="vibe-option" data-vibe="never">
        <span class="label">Never Again</span>
        <span class="sublabel">It offended me personally</span>
      </button>
    </div>

    <button class="save-btn" id="save-btn">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Log this Snacc
    </button>

    <div class="success-msg" id="success-msg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <div>
        <p>Logged.</p>
        <a href="index.html">View my Snaccs →</a>
      </div>
    </div>
  </div>
</div>

<script>
// ── Supabase config ──
const SUPABASE_URL  = 'https://apxhycmiqtwbrpcwgaag.supabase.co';
const SUPABASE_ANON = 'sb_publishable_pVCvt2_w1edNhnUcvQ5DEg_d-bTf05X';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function proxied(url) {
  return `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
}

async function getDominantColor(img) {
  return new Promise(resolve => {
    try {
      const canvas = document.createElement('canvas');
      const size = 80; canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      const { data } = ctx.getImageData(0, 0, size, size);
      const buckets = {};
      for (let i = 0; i < data.length; i += 4) {
        const r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
        if (a<180) continue;
        const br=(r+g+b)/3;
        if (br>228||br<18) continue;
        const key=`${Math.round(r/18)*18},${Math.round(g/18)*18},${Math.round(b/18)*18}`;
        buckets[key]=(buckets[key]||0)+1;
      }
      let best=null,max=0;
      for (const [k,v] of Object.entries(buckets)){if(v>max){max=v;best=k;}}
      if (!best){resolve(null);return;}
      const [r,g,b]=best.split(',').map(Number);
      resolve(`rgb(${Math.round(r*.66)},${Math.round(g*.66)},${Math.round(b*.66)})`);
    } catch {resolve(null);}
  });
}

function setStep(n) {
  ['dot1','dot2','dot3'].forEach((id,i) => {
    const d = document.getElementById(id);
    d.classList.toggle('done', i<n-1);
    d.classList.toggle('active', i===n-1);
  });
}

let selectedProduct = null;
let selectedVibe    = null;

// ── APIs ──
async function searchOFF(q) {
  try {
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=6&fields=id,product_name,brands,image_front_url`;
    const data = await (await fetch(url)).json();
    return (data.products||[]).filter(p=>p.product_name).map(p=>({
      id: p.id, name: p.product_name,
      brand: (p.brands||'').split(',')[0].trim(),
      image: p.image_front_url||null, source:'Open Food Facts',
    }));
  } catch { return []; }
}

async function searchUSDA(q) {
  try {
    const url = `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&dataType=Branded&pageSize=6&api_key=DEMO_KEY`;
    const data = await (await fetch(url)).json();
    return (data.foods||[]).filter(f=>f.description).map(f=>({
      id: `usda-${f.fdcId}`, name: f.description,
      brand: f.brandOwner||f.brandName||'',
      image: null, source:'USDA',
    }));
  } catch { return []; }
}

function buildResultCard(product) {
  const card  = document.createElement('div');
  card.className = 'result-card' + (!product.image?' no-img':'');
  const bg    = document.createElement('div'); bg.className = 'result-card-bg';
  const skel  = document.createElement('div'); skel.className = 'result-skel';
  const label = document.createElement('div'); label.className = 'result-card-label';
  label.innerHTML = `<span>${product.brand}</span><p>${product.name}</p><span class="src-badge">${product.source}</span>`;
  card.append(bg, skel, label);

  if (product.image) {
    const img = document.createElement('img');
    img.alt = product.name; img.crossOrigin = 'anonymous';
    card.insertBefore(img, skel);
    img.src = proxied(product.image);
    img.onload = async () => {
      img.style.opacity='1'; skel.style.opacity='0';
      setTimeout(()=>skel.remove(),500);
      const color = await getDominantColor(img);
      if (color) bg.style.backgroundColor = color;
    };
    img.onerror = () => {
      img.crossOrigin=null; img.src=product.image;
      img.onload=()=>{img.style.opacity='1';skel.remove();};
      img.onerror=()=>skel.remove();
    };
  } else {
    const colors=['#1a2a4a','#3a1a1a','#1a3a1a','#2a1a3a','#3a2a1a','#1a3a3a'];
    bg.style.backgroundColor = colors[product.name.charCodeAt(0)%colors.length];
    skel.remove();
  }

  card.addEventListener('mousemove', e => {
    const r=card.getBoundingClientRect();
    const rx=((e.clientY-r.top)/r.height-.5)*12;
    const ry=-((e.clientX-r.left)/r.width-.5)*12;
    card.style.transition='transform .08s ease';
    card.style.transform=`perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.02)`;
  });
  card.addEventListener('mouseleave',()=>{
    card.style.transition='transform .5s cubic-bezier(.16,1,.3,1)';
    card.style.transform='perspective(700px) rotateX(0) rotateY(0) scale(1)';
  });
  card.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
  card.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
  card.addEventListener('click',()=>{
    document.querySelectorAll('.result-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    selectProduct(product, card.querySelector('img')?.src||null);
  });
  return card;
}

function selectProduct(product, imgSrc) {
  selectedProduct = product;
  selectedVibe    = null;
  document.querySelectorAll('.vibe-option').forEach(b=>b.classList.remove('picked'));
  document.getElementById('save-btn').classList.remove('ready');
  document.getElementById('success-msg').classList.remove('show');

  document.getElementById('preview-brand').textContent = product.brand;
  document.getElementById('preview-name').textContent  = product.name;
  const pImg = document.getElementById('preview-img');
  pImg.src = imgSrc||product.image||'';
  pImg.style.display = (imgSrc||product.image) ? 'block' : 'none';

  document.getElementById('rating-section').classList.add('visible');
  setStep(2);
  setTimeout(()=>document.getElementById('rating-section').scrollIntoView({behavior:'smooth',block:'start'}),120);
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  selectedProduct=null; selectedVibe=null;
  document.getElementById('rating-section').classList.remove('visible');
  document.getElementById('save-btn').classList.remove('ready');
  document.getElementById('success-msg').classList.remove('show');
  document.getElementById('manual-form').classList.remove('show');

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML=''; resultsEl.classList.remove('visible');
  document.getElementById('searching-label').classList.add('show');
  setStep(1);

  const [off, usda] = await Promise.all([searchOFF(q), searchUSDA(q)]);
  document.getElementById('searching-label').classList.remove('show');

  const seen=new Set(), merged=[];
  for (const p of [...off,...usda]) {
    const key=p.name.toLowerCase().slice(0,30);
    if (!seen.has(key)){seen.add(key);merged.push(p);}
    if (merged.length>=6) break;
  }

  if (!merged.length) {
    resultsEl.innerHTML=`<div class="no-results">Nothing found across both databases.<button id="no-res-manual">Add it manually →</button></div>`;
    resultsEl.classList.add('visible');
    document.getElementById('no-res-manual').addEventListener('click', showManual);
    return;
  }

  merged.forEach(p=>resultsEl.appendChild(buildResultCard(p)));
  resultsEl.classList.add('visible');
}

document.getElementById('search-btn').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', e=>{if(e.key==='Enter')doSearch();});

function showManual() {
  document.getElementById('manual-form').classList.add('show');
  document.getElementById('manual-name').focus();
}
document.getElementById('manual-trigger').addEventListener('click', showManual);

document.getElementById('manual-confirm').addEventListener('click',()=>{
  const name  = document.getElementById('manual-name').value.trim();
  const brand = document.getElementById('manual-brand').value.trim();
  const img   = document.getElementById('manual-img').value.trim();
  if (!name){document.getElementById('manual-name').focus();return;}
  const product={id:`manual-${Date.now()}`,name,brand,image:img||null,source:'Manual'};
  document.getElementById('manual-form').classList.remove('show');
  document.getElementById('results').classList.remove('visible');
  selectProduct(product, img||null);
});

document.querySelectorAll('.vibe-option').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.vibe-option').forEach(b=>b.classList.remove('picked'));
    btn.classList.add('picked');
    selectedVibe=btn.dataset.vibe;
    document.getElementById('save-btn').classList.add('ready');
    setStep(3);
  });
  btn.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
  btn.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
});

document.getElementById('save-btn').addEventListener('click', async ()=>{
  if (!selectedProduct||!selectedVibe) return;

  const btn = document.getElementById('save-btn');
  btn.classList.add('saving');

  const { error } = await sb.from('ratings').insert({
    name:       selectedProduct.name,
    brand:      selectedProduct.brand||'',
    vibe:       selectedVibe,
    image:      selectedProduct.image||null,
    source:     selectedProduct.source||'',
    logged_at:  new Date().toISOString(),
  });

  btn.classList.remove('saving');

  if (!error) {
    btn.classList.remove('ready');
    document.getElementById('success-msg').classList.add('show');
    document.querySelectorAll('.vibe-option').forEach(b=>b.classList.remove('picked'));
    selectedProduct=null; selectedVibe=null;
    setStep(1);
  }
});

document.querySelectorAll('.nav-links a, .logo, .search-btn, .save-btn, .manual-trigger, .manual-confirm-btn').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
});

const dot=document.getElementById('cur-dot');
const ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
dot.style.left=dot.style.top='-100px';
ring.style.left=ring.style.top='-100px';
(function loop(){
  rx+=(mx-rx)*.13;ry+=(my-ry)*.13;
  dot.style.left=mx+'px';dot.style.top=my+'px';
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(loop);
})();
</script>
</body>
